<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Superadmin v2 - Albatrans</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  margin:0;
  padding:20px;
}
.wrap{
  max-width:1400px;
  margin:0 auto;
}
.topbar{
  background:#121b2f;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
h1,h2,h3{
  margin:0 0 12px 0;
}
.card{
  background:#121b2f;
  border-radius:12px;
  padding:18px;
  margin-bottom:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}
label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  color:#cdd6f4;
}
input{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0b1220;
  color:white;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#ff7a18;
  color:#1b0c02;
  font-weight:bold;
  cursor:pointer;
}
button.sec{
  background:#24314f;
  color:white;
}
button.danger{
  background:#ff4d4f;
  color:white;
}
button.ok{
  background:#1f8b4c;
  color:white;
}
button.warn{
  background:#7a4b00;
  color:#fff;
}
.small{
  font-size:13px;
  color:#aab4d6;
}
.empresa-box{
  background:#0b1220;
  border-radius:10px;
  padding:14px;
  margin-top:14px;
}
.empresa-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}
.sub-box{
  background:#121b2f;
  border-radius:10px;
  padding:12px;
  margin-top:12px;
}
.item{
  background:#18233b;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  flex-wrap:wrap;
}
.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
#estado{
  margin-top:12px;
  white-space:pre-line;
}
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:#24314f;
  color:#d9e3ff;
  font-size:12px;
  font-weight:bold;
  margin-right:6px;
  margin-top:4px;
}
.badge.warn{
  background:#7a4b00;
  color:#ffe1a6;
}
.badge.ok{
  background:#1f8b4c;
  color:white;
}
.badge.off{
  background:#8e2f2f;
  color:white;
}
.featuresGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
  margin-top:12px;
}
.featureItem{
  background:#18233b;
  border-radius:10px;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
input[type="checkbox"]{
  width:auto;
  transform:scale(1.1);
}
@media (max-width:700px){
  body{padding:12px;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div>
      <h1>Superadmin v2</h1>
      <div class="small">Empresas, admins y módulos por empresa</div>
    </div>
    <div class="actions">
      <a class="sec" href="admin-v2.html" style="text-decoration:none;padding:10px 14px;border-radius:8px;background:#24314f;color:white;">Ir a admin</a>
      <button class="sec" id="btnRecargar">Recargar</button>
      <button id="btnCerrarSesion">Cerrar sesión</button>
    </div>
  </div>

  <div class="card">
    <h2>Crear empresa nueva</h2>
    <div class="grid">
      <div>
        <label>Nombre</label>
        <input id="empresaNombre" placeholder="Ej: Dutti Trans">
      </div>
      <div>
        <label>Slug</label>
        <input id="empresaSlug" placeholder="Ej: duttitrans">
      </div>
      <div>
        <label>Razón social</label>
        <input id="empresaRazonSocial" placeholder="Ej: Dutti Trans, S.L.">
      </div>
      <div>
        <label>CIF</label>
        <input id="empresaCif" placeholder="Ej: B12345678">
      </div>
      <div>
        <label>Email</label>
        <input id="empresaEmail" placeholder="Ej: info@empresa.com">
      </div>
      <div>
        <label>Teléfono</label>
        <input id="empresaTelefono" placeholder="Ej: 600000000">
      </div>
      <div>
        <label>Dirección</label>
        <input id="empresaDireccion" placeholder="Ej: Calle Ejemplo 1, Madrid">
      </div>
      <div>
        <label>Color principal</label>
        <input id="empresaColor" value="#ff7a18">
      </div>
      <div>
        <label>Nombre del admin</label>
        <input id="adminNombre" placeholder="Ej: Oficina Dutti">
      </div>
      <div>
        <label>Usuario del admin</label>
        <input id="adminUsuario" placeholder="Ej: oficina-dutti">
      </div>
      <div>
        <label>Contraseña del admin</label>
        <input id="adminPassword" placeholder="Ej: 1234">
      </div>
    </div>

    <div class="actions" style="margin-top:14px;">
      <button id="btnCrearEmpresa">Crear empresa + admin</button>
    </div>
  </div>

  <div class="card">
    <h2>Empresas registradas</h2>
    <div id="estado"></div>
    <div id="listaEmpresas"></div>
  </div>

</div>

<script type="module">
import {
  getSession,
  requireRole,
  logoutApp,
  getCompanies,
  createCompany,
  createAdminForCompany,
  updateCompanyModules,
  toggleCompanyStatus,
  MODULE_LABELS
} from "./app-utils-v2.js";

const session = requireRole(["superadmin"]);
if (!session) {
  throw new Error("Acceso no autorizado");
}

const estadoEl = document.getElementById("estado");
const listaEmpresasEl = document.getElementById("listaEmpresas");

const empresaNombreEl = document.getElementById("empresaNombre");
const empresaSlugEl = document.getElementById("empresaSlug");
const empresaRazonSocialEl = document.getElementById("empresaRazonSocial");
const empresaCifEl = document.getElementById("empresaCif");
const empresaEmailEl = document.getElementById("empresaEmail");
const empresaTelefonoEl = document.getElementById("empresaTelefono");
const empresaDireccionEl = document.getElementById("empresaDireccion");
const empresaColorEl = document.getElementById("empresaColor");
const adminNombreEl = document.getElementById("adminNombre");
const adminUsuarioEl = document.getElementById("adminUsuario");
const adminPasswordEl = document.getElementById("adminPassword");

const btnCrearEmpresa = document.getElementById("btnCrearEmpresa");
const btnCerrarSesion = document.getElementById("btnCerrarSesion");
const btnRecargar = document.getElementById("btnRecargar");

let companiesCache = [];

function setEstado(texto) {
  estadoEl.innerText = texto || "";
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function limpiarFormulario() {
  empresaNombreEl.value = "";
  empresaSlugEl.value = "";
  empresaRazonSocialEl.value = "";
  empresaCifEl.value = "";
  empresaEmailEl.value = "";
  empresaTelefonoEl.value = "";
  empresaDireccionEl.value = "";
  empresaColorEl.value = "#ff7a18";
  adminNombreEl.value = "";
  adminUsuarioEl.value = "";
  adminPasswordEl.value = "";
}

function slugify(texto) {
  return String(texto || "")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9-]/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");
}

function renderCompanies(companies) {
  companiesCache = companies || [];
  listaEmpresasEl.innerHTML = "";

  if (!companiesCache.length) {
    listaEmpresasEl.innerHTML = "<div class='small'>No hay empresas todavía.</div>";
    return;
  }

  companiesCache.forEach(company => {
    const modules = company.modulos_empresa?.[0] || {};
    const users = company.usuarios_app || [];

    const adminUsers = users.filter(u => u.rol === "admin");
    const conductores = users.filter(u => u.rol === "conductor");

    const box = document.createElement("div");
    box.className = "empresa-box";

    const modulesHtml = Object.keys(MODULE_LABELS).map(key => `
      <label class="featureItem">
        <span>${escapeHtml(MODULE_LABELS[key])}</span>
        <input
          type="checkbox"
          data-action="toggle-module"
          data-company-id="${company.id}"
          data-module="${key}"
          ${modules[key] ? "checked" : ""}
        >
      </label>
    `).join("");

    const adminsHtml = adminUsers.length
      ? adminUsers.map(user => `
        <div class="item">
          <div>
            <strong>${escapeHtml(user.nombre || "")}</strong>
            <div class="small">Usuario: ${escapeHtml(user.usuario || "")}</div>
            <div class="small">Rol: ${escapeHtml(user.rol || "")}</div>
            <div class="small">Activo: ${user.activo ? "Sí" : "No"}</div>
          </div>
        </div>
      `).join("")
      : "<div class='small'>Sin admin asignado.</div>";

    const conductoresHtml = conductores.length
      ? conductores.map(user => `
        <div class="item">
          <div>
            <strong>${escapeHtml(user.nombre || "")}</strong>
            <div class="small">Usuario: ${escapeHtml(user.usuario || "")}</div>
            <div class="small">Rol: ${escapeHtml(user.rol || "")}</div>
            <div class="small">Activo: ${user.activo ? "Sí" : "No"}</div>
          </div>
        </div>
      `).join("")
      : "<div class='small'>Sin conductores.</div>";

    box.innerHTML = `
      <div class="empresa-head">
        <div>
          <h3>${escapeHtml(company.nombre || "")}</h3>
          <div style="margin-bottom:6px;">
            <span class="badge ${company.activa ? "ok" : "off"}">${company.activa ? "Activa" : "Desactivada"}</span>
            <span class="badge">${escapeHtml(company.slug || "")}</span>
          </div>
          <div class="small">Razón social: ${escapeHtml(company.razon_social || "-")}</div>
          <div class="small">CIF: ${escapeHtml(company.cif || "-")}</div>
          <div class="small">Email: ${escapeHtml(company.email || "-")}</div>
          <div class="small">Teléfono: ${escapeHtml(company.telefono || "-")}</div>
          <div class="small">Dirección: ${escapeHtml(company.direccion || "-")}</div>
        </div>

        <div class="actions">
          <button
            class="${company.activa ? "warn" : "ok"}"
            data-action="toggle-company"
            data-company-id="${company.id}"
            data-company-active="${company.activa ? "1" : "0"}"
          >
            ${company.activa ? "Desactivar" : "Activar"}
          </button>
        </div>
      </div>

      <div class="sub-box">
        <strong>Módulos por empresa</strong>
        <div class="featuresGrid">${modulesHtml}</div>
      </div>

      <div class="sub-box">
        <strong>Admins (${adminUsers.length})</strong>
        ${adminsHtml}
      </div>

      <div class="sub-box">
        <strong>Conductores (${conductores.length})</strong>
        ${conductoresHtml}
      </div>
    `;

    listaEmpresasEl.appendChild(box);
  });
}

async function recargarTodo() {
  try {
    setEstado("Cargando empresas...");
    const companies = await getCompanies();
    renderCompanies(companies);
    setEstado("Datos cargados correctamente");
  } catch (e) {
    console.error(e);
    setEstado("Error: " + e.message);
  }
}

async function crearEmpresaConAdmin() {
  try {
    const nombre = empresaNombreEl.value.trim();
    const slugManual = empresaSlugEl.value.trim();
    const razon_social = empresaRazonSocialEl.value.trim();
    const cif = empresaCifEl.value.trim();
    const email = empresaEmailEl.value.trim();
    const telefono = empresaTelefonoEl.value.trim();
    const direccion = empresaDireccionEl.value.trim();
    const color_primario = empresaColorEl.value.trim() || "#ff7a18";
    const adminNombre = adminNombreEl.value.trim();
    const adminUsuario = adminUsuarioEl.value.trim();
    const adminPassword = adminPasswordEl.value.trim();

    if (!nombre) {
      setEstado("Pon el nombre de la empresa");
      return;
    }

    if (!adminNombre || !adminUsuario || !adminPassword) {
      setEstado("Completa nombre, usuario y contraseña del admin");
      return;
    }

    const slug = slugify(slugManual || nombre);

    setEstado("Creando empresa...");
    const company = await createCompany({
      nombre,
      slug,
      razon_social,
      cif,
      email,
      telefono,
      direccion,
      color_primario
    });

    await createAdminForCompany({
      empresa_id: company.id,
      nombre: adminNombre,
      usuario: adminUsuario,
      password: adminPassword
    });

    limpiarFormulario();
    await recargarTodo();
    setEstado("Empresa y admin creados correctamente");
  } catch (e) {
    console.error(e);
    setEstado("Error: " + e.message);
  }
}

async function guardarCambioModulo(companyId, moduleName, checked) {
  try {
    setEstado("Guardando módulo...");
    await updateCompanyModules(companyId, { [moduleName]: checked });
    setEstado("Módulo actualizado");
  } catch (e) {
    console.error(e);
    setEstado("Error: " + e.message);
    await recargarTodo();
  }
}

async function toggleEmpresa(companyId, currentActive) {
  try {
    setEstado("Actualizando empresa...");
    await toggleCompanyStatus(companyId, !currentActive);
    await recargarTodo();
    setEstado("Empresa actualizada correctamente");
  } catch (e) {
    console.error(e);
    setEstado("Error: " + e.message);
  }
}

btnCrearEmpresa.addEventListener("click", crearEmpresaConAdmin);
btnCerrarSesion.addEventListener("click", logoutApp);
btnRecargar.addEventListener("click", recargarTodo);

listaEmpresasEl.addEventListener("change", async (e) => {
  const action = e.target.getAttribute("data-action");
  if (action !== "toggle-module") return;

  const companyId = e.target.getAttribute("data-company-id");
  const moduleName = e.target.getAttribute("data-module");
  const checked = e.target.checked;

  if (!companyId || !moduleName) return;
  await guardarCambioModulo(companyId, moduleName, checked);
});

listaEmpresasEl.addEventListener("click", async (e) => {
  const action = e.target.getAttribute("data-action");
  if (action !== "toggle-company") return;

  const companyId = e.target.getAttribute("data-company-id");
  const currentActive = e.target.getAttribute("data-company-active") === "1";

  if (!companyId) return;
  await toggleEmpresa(companyId, currentActive);
});

await recargarTodo();
</script>
</body>
</html>
