<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin v2 - Albatrans</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  margin:0;
  padding:20px;
}

.wrap{
  max-width:1450px;
  margin:0 auto;
}

.topbar{
  background:#121b2f;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

h1{
  margin:0;
  font-size:28px;
}

button, .btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#ff7a18;
  color:#1b0c02;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
}

button.sec, .btn.sec{
  background:#24314f;
  color:white;
}

.card{
  background:#121b2f;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
}

#status{
  margin-top:10px;
  font-weight:bold;
}

.tableWrap{
  overflow:auto;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1800px;
  background:#121b2f;
}

th, td{
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:10px;
  text-align:left;
  vertical-align:top;
  font-size:14px;
}

th{
  background:#18233b;
  position:sticky;
  top:0;
  z-index:1;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  margin-right:6px;
  margin-bottom:4px;
}

.si{
  background:#1f8b4c;
  color:white;
}

.no{
  background:#3a445f;
  color:#cfd8f0;
}

.info{
  background:#274d8a;
  color:white;
}

.warn{
  background:#a86d16;
  color:white;
}

.danger{
  background:#a83232;
  color:white;
}

.estadoPendiente{
  background:#5a647c;
  color:white;
}

.estadoRuta{
  background:#255fa8;
  color:white;
}

.estadoEntregado{
  background:#1f8b4c;
  color:white;
}

.estadoFacturado{
  background:#7a4db4;
  color:white;
}

a{
  color:#7db4ff;
}

img.thumb{
  width:90px;
  max-width:90px;
  border-radius:8px;
  display:block;
  cursor:pointer;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.smallBtn{
  padding:8px 10px;
  font-size:12px;
}

.empty{
  opacity:.8;
  padding:20px;
}

.filters{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:10px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}

input[type="checkbox"]{
  width:auto;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:1000;
}

.modal.open{
  display:flex;
}

.modalContent{
  background:#121b2f;
  border-radius:12px;
  padding:20px;
  max-width:900px;
  width:100%;
  max-height:90vh;
  overflow:auto;
}

.modalContent img{
  width:100%;
  border-radius:10px;
}

.muted{
  color:#b7c3dd;
  font-size:13px;
}

.formGrid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:12px;
}

.checkboxRow{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  margin-top:10px;
}

.checkboxRow label{
  display:flex;
  align-items:center;
  gap:8px;
}

.modalActions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.dashboardGrid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:12px;
}

.kpi{
  background:#0b1220;
  border-radius:10px;
  padding:12px;
}

.kpi .kpiTitle{
  font-size:13px;
  color:#c9d5f0;
  margin-bottom:6px;
}

.kpi .kpiValue{
  font-size:24px;
  font-weight:bold;
}

.estadoSelect{
  min-width:140px;
}

@media (max-width: 900px){
  body{
    padding:12px;
  }

  h1{
    font-size:22px;
  }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <div>
      <h1 id="panelTitle">Admin v2</h1>
      <div class="muted" id="panelSubtitle">Cargando empresa...</div>
    </div>

    <div class="actions">
      <a class="btn sec" href="superadmin-v2.html" id="btnSuperadmin" style="display:none;">Superadmin</a>
      <button class="sec" id="btnActualizar">Actualizar</button>
      <button id="btnSalir">Salir</button>
    </div>
  </div>

  <div id="dashboardSection" class="card">
    <h3 style="margin-top:0;">Dashboard</h3>
    <div id="dashboardResumen" class="dashboardGrid"></div>
  </div>

  <div class="card">
    <div class="filters">
      <div>
        <label>Buscar</label>
        <input id="searchInput" placeholder="Conductor, cliente, matrícula, carga, descarga...">
      </div>

      <div>
        <label>Estado</label>
        <select id="estadoFilter">
          <option value="">Todos</option>
          <option value="pendiente">Pendiente</option>
          <option value="en_ruta">En ruta</option>
          <option value="entregado">Entregado</option>
          <option value="facturado">Facturado</option>
        </select>
      </div>

      <div>
        <label>Urgente</label>
        <select id="urgenteFilter">
          <option value="">Todos</option>
          <option value="si">Solo urgentes</option>
          <option value="no">No urgentes</option>
        </select>
      </div>

      <div>
        <label>Mozo</label>
        <select id="mozoFilter">
          <option value="">Todos</option>
          <option value="si">Con mozo</option>
          <option value="no">Sin mozo</option>
        </select>
      </div>

      <div>
        <label>Trampilla</label>
        <select id="trampillaFilter">
          <option value="">Todos</option>
          <option value="si">Con trampilla</option>
          <option value="no">Sin trampilla</option>
        </select>
      </div>
    </div>

    <div id="status"></div>
  </div>

  <div class="card">
    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Conductor</th>
            <th>Matrícula</th>
            <th>Cliente</th>
            <th>Lugar de carga</th>
            <th>Lugar de descarga</th>
            <th>Nº entregas</th>
            <th>Bultos</th>
            <th>Kg</th>
            <th>M3</th>
            <th>Observaciones</th>
            <th>Extras</th>
            <th>Foto</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyEntregas">
          <tr>
            <td colspan="16" class="empty">Cargando entregas...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="photoModal" class="modal">
  <div class="modalContent">
    <div class="actions" style="justify-content:space-between;margin-bottom:12px;">
      <strong>Foto de albarán</strong>
      <button class="sec smallBtn" id="cerrarFotoBtn">Cerrar</button>
    </div>
    <img id="modalImg" src="" alt="Foto de entrega">
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modalContent">
    <div class="actions" style="justify-content:space-between;margin-bottom:12px;">
      <strong>Editar entrega</strong>
      <button class="sec smallBtn" id="cerrarEditBtn">Cerrar</button>
    </div>

    <div class="formGrid">
      <div>
        <label>Conductor</label>
        <input id="edit_driver_name">
      </div>

      <div>
        <label>Matrícula</label>
        <input id="edit_vehicle_plate">
      </div>

      <div>
        <label>Cliente</label>
        <input id="edit_client_name">
      </div>

      <div>
        <label>Lugar de carga</label>
        <input id="edit_pickup_place">
      </div>

      <div>
        <label>Lugar de descarga</label>
        <input id="edit_dropoff_place">
      </div>

      <div>
        <label>Nº entregas</label>
        <input id="edit_num_entregas" type="number">
      </div>

      <div>
        <label>Bultos</label>
        <input id="edit_bultos" type="number">
      </div>

      <div>
        <label>Kg</label>
        <input id="edit_kg" type="number" step="0.01">
      </div>

      <div>
        <label>M3</label>
        <input id="edit_m3" type="number" step="0.01">
      </div>

      <div>
        <label>Km</label>
        <input id="edit_distance_km" type="number" step="0.01">
      </div>

      <div>
        <label>Precio (€)</label>
        <input id="edit_price_eur" type="number" step="0.01">
      </div>
    </div>

    <div style="margin-top:12px;">
      <label>Observaciones</label>
      <textarea id="edit_observations" rows="4"></textarea>
    </div>

    <div class="checkboxRow">
      <label><input id="edit_mozo" type="checkbox"> Mozo</label>
      <label><input id="edit_trampilla" type="checkbox"> Trampilla</label>
      <label><input id="edit_urgente" type="checkbox"> Urgente</label>
    </div>

    <div class="modalActions">
      <button class="sec" id="cancelarEditBtn">Cancelar</button>
      <button id="guardarEntregaBtn">Guardar cambios</button>
    </div>
  </div>
</div>

<script type="module">
import {
  supabase,
  getSession,
  requireRole,
  logoutApp
} from "./app-utils-v2.js";

const session = requireRole(["superadmin", "admin"]);
if (!session) {
  throw new Error("Sesión no válida");
}

const statusEl = document.getElementById("status");
const tbodyEntregas = document.getElementById("tbodyEntregas");
const searchInput = document.getElementById("searchInput");
const estadoFilter = document.getElementById("estadoFilter");
const urgenteFilter = document.getElementById("urgenteFilter");
const mozoFilter = document.getElementById("mozoFilter");
const trampillaFilter = document.getElementById("trampillaFilter");
const panelTitle = document.getElementById("panelTitle");
const panelSubtitle = document.getElementById("panelSubtitle");
const dashboardResumen = document.getElementById("dashboardResumen");
const dashboardSection = document.getElementById("dashboardSection");
const btnSuperadmin = document.getElementById("btnSuperadmin");

const photoModal = document.getElementById("photoModal");
const modalImg = document.getElementById("modalImg");
const cerrarFotoBtn = document.getElementById("cerrarFotoBtn");

const editModal = document.getElementById("editModal");
const cerrarEditBtn = document.getElementById("cerrarEditBtn");
const cancelarEditBtn = document.getElementById("cancelarEditBtn");
const guardarEntregaBtn = document.getElementById("guardarEntregaBtn");

const editDriverName = document.getElementById("edit_driver_name");
const editVehiclePlate = document.getElementById("edit_vehicle_plate");
const editClientName = document.getElementById("edit_client_name");
const editPickupPlace = document.getElementById("edit_pickup_place");
const editDropoffPlace = document.getElementById("edit_dropoff_place");
const editNumEntregas = document.getElementById("edit_num_entregas");
const editBultos = document.getElementById("edit_bultos");
const editKg = document.getElementById("edit_kg");
const editM3 = document.getElementById("edit_m3");
const editDistanceKm = document.getElementById("edit_distance_km");
const editPriceEur = document.getElementById("edit_price_eur");
const editObservations = document.getElementById("edit_observations");
const editMozo = document.getElementById("edit_mozo");
const editTrampilla = document.getElementById("edit_trampilla");
const editUrgente = document.getElementById("edit_urgente");

const btnActualizar = document.getElementById("btnActualizar");
const btnSalir = document.getElementById("btnSalir");

let entregasGlobal = [];
let entregaEditandoId = null;

function moduloActivo(nombre, porDefecto = true) {
  if (session.rol === "superadmin") return true;
  if (!session.modulos) return porDefecto;
  if (session.modulos[nombre] === undefined || session.modulos[nombre] === null) {
    return porDefecto;
  }
  return !!session.modulos[nombre];
}

function aplicarColorEmpresa() {
  const color = session.empresa_color || "#ff7a18";
  document.documentElement.style.setProperty("--empresa-color", color);

  document.querySelectorAll("button:not(.sec), .btn:not(.sec)").forEach(el => {
    el.style.background = color;
  });
}

function escapeHtml(valor) {
  return String(valor ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatEuros(valor) {
  return new Intl.NumberFormat("es-ES", {
    style: "currency",
    currency: "EUR"
  }).format(Number(valor || 0));
}

function formatearFecha(fechaIso) {
  if (!fechaIso) return "";
  const fecha = new Date(fechaIso);
  if (isNaN(fecha.getTime())) return fechaIso;
  return fecha.toLocaleString("es-ES");
}

function normalizarNumero(valor) {
  if (valor === null || valor === undefined || valor === "") return null;
  const n = Number(String(valor).replace(",", "."));
  return Number.isNaN(n) ? null : n;
}

function badgeBooleano(activo, texto) {
  return `<span class="badge ${activo ? "si" : "no"}">${texto}: ${activo ? "Sí" : "No"}</span>`;
}

function badgeEstado(estado) {
  const e = String(estado || "pendiente").toLowerCase();
  if (e === "en_ruta") return `<span class="badge estadoRuta">En ruta</span>`;
  if (e === "entregado") return `<span class="badge estadoEntregado">Entregado</span>`;
  if (e === "facturado") return `<span class="badge estadoFacturado">Facturado</span>`;
  return `<span class="badge estadoPendiente">Pendiente</span>`;
}

function cumpleFiltroBooleano(valorReal, filtro) {
  if (!filtro) return true;
  if (filtro === "si") return !!valorReal === true;
  if (filtro === "no") return !!valorReal === false;
  return true;
}

function puedeEditarEntrega(entrega) {
  if (session.rol === "superadmin") return true;
  return String(entrega.empresa_id || "") === String(session.empresa_id || "");
}

function abrirModalFoto(url) {
  modalImg.src = url;
  photoModal.classList.add("open");
}

function cerrarModalFoto() {
  photoModal.classList.remove("open");
  modalImg.src = "";
}

function abrirEditModal() {
  editModal.classList.add("open");
}

function cerrarEditModal() {
  editModal.classList.remove("open");
  entregaEditandoId = null;
}

function renderDashboard(lista) {
  if (!moduloActivo("dashboard", true)) {
    dashboardSection.style.display = "none";
    return;
  }

  dashboardSection.style.display = "block";

  const hoy = new Date().toISOString().slice(0, 10);
  const mes = hoy.slice(0, 7);

  const entregasHoy = lista.filter(e => String(e.created_at || "").slice(0, 10) === hoy).length;
  const entregasMes = lista.filter(e => String(e.created_at || "").slice(0, 7) === mes).length;
  const pendientes = lista.filter(e => String(e.estado || "pendiente") === "pendiente").length;
  const enRuta = lista.filter(e => String(e.estado || "") === "en_ruta").length;
  const entregados = lista.filter(e => String(e.estado || "") === "entregado").length;
  const facturados = lista.filter(e => String(e.estado || "") === "facturado").length;
  const totalKg = lista.reduce((acc, e) => acc + Number(e.kg || 0), 0);
  const totalBultos = lista.reduce((acc, e) => acc + Number(e.bultos || 0), 0);
  const totalM3 = lista.reduce((acc, e) => acc + Number(e.m3 || 0), 0);
  const totalPrecio = lista.reduce((acc, e) => acc + Number(e.price_eur || 0), 0);

  dashboardResumen.innerHTML = `
    <div class="kpi"><div class="kpiTitle">Entregas hoy</div><div class="kpiValue">${entregasHoy}</div></div>
    <div class="kpi"><div class="kpiTitle">Entregas este mes</div><div class="kpiValue">${entregasMes}</div></div>
    <div class="kpi"><div class="kpiTitle">Pendientes</div><div class="kpiValue">${pendientes}</div></div>
    <div class="kpi"><div class="kpiTitle">En ruta</div><div class="kpiValue">${enRuta}</div></div>
    <div class="kpi"><div class="kpiTitle">Entregados</div><div class="kpiValue">${entregados}</div></div>
    <div class="kpi"><div class="kpiTitle">Facturados</div><div class="kpiValue">${facturados}</div></div>
    <div class="kpi"><div class="kpiTitle">Total facturable</div><div class="kpiValue" style="font-size:20px;">${formatEuros(totalPrecio)}</div></div>
    <div class="kpi"><div class="kpiTitle">KG totales</div><div class="kpiValue">${Number(totalKg.toFixed(2))}</div></div>
    <div class="kpi"><div class="kpiTitle">Bultos totales</div><div class="kpiValue">${totalBultos}</div></div>
    <div class="kpi"><div class="kpiTitle">M3 totales</div><div class="kpiValue">${Number(totalM3.toFixed(2))}</div></div>
  `;
}

function renderSelectEstado(entrega) {
  const deshabilitado = !puedeEditarEntrega(entrega);

  return `
    <div>
      ${badgeEstado(entrega.estado)}
      <div style="margin-top:8px;">
        <select class="estadoSelect" onchange="window.cambiarEstadoEntrega('${entrega.id}', this.value)" ${deshabilitado ? "disabled" : ""}>
          <option value="pendiente" ${String(entrega.estado || "pendiente") === "pendiente" ? "selected" : ""}>Pendiente</option>
          <option value="en_ruta" ${String(entrega.estado || "") === "en_ruta" ? "selected" : ""}>En ruta</option>
          <option value="entregado" ${String(entrega.estado || "") === "entregado" ? "selected" : ""}>Entregado</option>
          <option value="facturado" ${String(entrega.estado || "") === "facturado" ? "selected" : ""}>Facturado</option>
        </select>
      </div>
    </div>
  `;
}

function renderEntregas(lista) {
  if (!lista.length) {
    tbodyEntregas.innerHTML = `
      <tr>
        <td colspan="16" class="empty">No hay entregas que coincidan con el filtro.</td>
      </tr>
    `;
    return;
  }

  tbodyEntregas.innerHTML = lista.map(entrega => {
    const fotoHtml = entrega.photo_url
      ? `
        <a href="${escapeHtml(entrega.photo_url)}" target="_blank" rel="noopener noreferrer">Ver</a>
        <br><br>
        <img class="thumb" src="${escapeHtml(entrega.photo_url)}" alt="Foto entrega" onclick="window.abrirModalFoto('${escapeHtml(entrega.photo_url)}')">
      `
      : "Sin foto";

    const acciones = puedeEditarEntrega(entrega)
      ? `
        <div class="actions">
          <button class="smallBtn sec" onclick="window.editarEntrega('${entrega.id}')">Editar</button>
          <button class="smallBtn sec" onclick="window.borrarEntrega('${entrega.id}')">Borrar</button>
        </div>
      `
      : `<span class="muted">Sin permiso</span>`;

    return `
      <tr>
        <td>${formatearFecha(entrega.created_at)}</td>
        <td>${renderSelectEstado(entrega)}</td>
        <td>${escapeHtml(entrega.driver_name)}</td>
        <td>${escapeHtml(entrega.vehicle_plate)}</td>
        <td>${escapeHtml(entrega.client_name)}</td>
        <td>${escapeHtml(entrega.pickup_place)}</td>
        <td>${escapeHtml(entrega.dropoff_place)}</td>
        <td>${escapeHtml(entrega.num_entregas)}</td>
        <td>${escapeHtml(entrega.bultos)}</td>
        <td>${escapeHtml(entrega.kg)}</td>
        <td>${escapeHtml(entrega.m3)}</td>
        <td>${escapeHtml(entrega.observations || "")}</td>
        <td>
          ${badgeBooleano(entrega.mozo, "Mozo")}
          ${badgeBooleano(entrega.trampilla, "Trampilla")}
          ${badgeBooleano(entrega.urgente, "Urgente")}
        </td>
        <td>${fotoHtml}</td>
        <td>${entrega.price_eur != null ? formatEuros(entrega.price_eur) : ""}</td>
        <td>${acciones}</td>
      </tr>
    `;
  }).join("");
}

function aplicarFiltros() {
  const texto = searchInput.value.trim().toLowerCase();

  const filtradas = entregasGlobal.filter(entrega => {
    const bloqueTexto = [
      entrega.driver_name,
      entrega.vehicle_plate,
      entrega.client_name,
      entrega.pickup_place,
      entrega.dropoff_place,
      entrega.num_entregas,
      entrega.observations,
      entrega.estado
    ]
    .map(v => (v || "").toString().toLowerCase())
    .join(" ");

    const pasaTexto = !texto || bloqueTexto.includes(texto);
    const pasaEstado = !estadoFilter.value || String(entrega.estado || "pendiente") === estadoFilter.value;
    const pasaUrgente = cumpleFiltroBooleano(entrega.urgente, urgenteFilter.value);
    const pasaMozo = cumpleFiltroBooleano(entrega.mozo, mozoFilter.value);
    const pasaTrampilla = cumpleFiltroBooleano(entrega.trampilla, trampillaFilter.value);

    return pasaTexto && pasaEstado && pasaUrgente && pasaMozo && pasaTrampilla;
  });

  renderEntregas(filtradas);
  renderDashboard(filtradas);
}

async function cargarInfoCabecera() {
  if (session.rol === "superadmin") {
    panelTitle.innerText = "Panel Admin Global";
    panelSubtitle.innerText = "Viendo todas las entregas";
    btnSuperadmin.style.display = "inline-block";
    return;
  }

  panelTitle.innerText = "Panel Admin";
  panelSubtitle.innerText = "Empresa: " + (session.empresa_nombre || "Sin empresa");
}

async function cargarEntregas() {
  try {
    statusEl.innerText = "Cargando entregas...";

    let query = supabase
      .from("deliveries")
      .select(`
        id,
        empresa_id,
        created_at,
        driver_name,
        vehicle_plate,
        client_name,
        pickup_place,
        dropoff_place,
        num_entregas,
        bultos,
        kg,
        m3,
        observations,
        mozo,
        trampilla,
        urgente,
        distance_km,
        price_eur,
        photo_url,
        estado
      `)
      .order("created_at", { ascending: false });

    if (session.rol === "admin") {
      query = query.eq("empresa_id", session.empresa_id);
    }

    const { data, error } = await query;

    if (error) {
      statusEl.innerText = "Error cargando entregas: " + error.message;
      tbodyEntregas.innerHTML = `
        <tr>
          <td colspan="16" class="empty">No se pudieron cargar las entregas.</td>
        </tr>
      `;
      return;
    }

    entregasGlobal = (data || []).map(item => ({
      ...item,
      estado: item.estado || "pendiente"
    }));

    aplicarFiltros();

    statusEl.innerText = "Entregas cargadas: " + entregasGlobal.length;
  } catch (e) {
    statusEl.innerText = "Fallo cargando entregas: " + e.message;
  }
}

window.abrirModalFoto = abrirModalFoto;

window.editarEntrega = function(id) {
  const entrega = entregasGlobal.find(e => e.id === id);
  if (!entrega) {
    alert("No se encontró la entrega");
    return;
  }

  if (!puedeEditarEntrega(entrega)) {
    alert("No tienes permiso para editar esta entrega");
    return;
  }

  entregaEditandoId = id;

  editDriverName.value = entrega.driver_name || "";
  editVehiclePlate.value = entrega.vehicle_plate || "";
  editClientName.value = entrega.client_name || "";
  editPickupPlace.value = entrega.pickup_place || "";
  editDropoffPlace.value = entrega.dropoff_place || "";
  editNumEntregas.value = entrega.num_entregas ?? "";
  editBultos.value = entrega.bultos ?? "";
  editKg.value = entrega.kg ?? "";
  editM3.value = entrega.m3 ?? "";
  editDistanceKm.value = entrega.distance_km ?? "";
  editPriceEur.value = entrega.price_eur ?? "";
  editObservations.value = entrega.observations || "";
  editMozo.checked = !!entrega.mozo;
  editTrampilla.checked = !!entrega.trampilla;
  editUrgente.checked = !!entrega.urgente;

  abrirEditModal();
};

async function guardarCambiosEntrega() {
  if (!entregaEditandoId) {
    alert("No hay ninguna entrega seleccionada");
    return;
  }

  try {
    statusEl.innerText = "Guardando cambios...";

    let query = supabase
      .from("deliveries")
      .update({
        driver_name: editDriverName.value.trim() || null,
        vehicle_plate: editVehiclePlate.value.trim() || null,
        client_name: editClientName.value.trim() || null,
        pickup_place: editPickupPlace.value.trim() || null,
        dropoff_place: editDropoffPlace.value.trim() || null,
        num_entregas: normalizarNumero(editNumEntregas.value),
        bultos: normalizarNumero(editBultos.value),
        kg: normalizarNumero(editKg.value),
        m3: normalizarNumero(editM3.value),
        distance_km: normalizarNumero(editDistanceKm.value),
        price_eur: normalizarNumero(editPriceEur.value),
        observations: editObservations.value.trim() || null,
        mozo: editMozo.checked,
        trampilla: editTrampilla.checked,
        urgente: editUrgente.checked
      })
      .eq("id", entregaEditandoId);

    if (session.rol === "admin") {
      query = query.eq("empresa_id", session.empresa_id);
    }

    const { error } = await query;

    if (error) {
      alert("Error guardando cambios: " + error.message);
      statusEl.innerText = "Error guardando cambios: " + error.message;
      return;
    }

    cerrarEditModal();
    statusEl.innerText = "Entrega actualizada correctamente";
    await cargarEntregas();
  } catch (e) {
    alert("Fallo guardando cambios: " + e.message);
    statusEl.innerText = "Fallo guardando cambios: " + e.message;
  }
}

window.cambiarEstadoEntrega = async function(id, nuevoEstado) {
  try {
    statusEl.innerText = "Cambiando estado...";

    let query = supabase
      .from("deliveries")
      .update({ estado: nuevoEstado })
      .eq("id", id);

    if (session.rol === "admin") {
      query = query.eq("empresa_id", session.empresa_id);
    }

    const { error } = await query;

    if (error) {
      alert("Error cambiando estado: " + error.message);
      statusEl.innerText = "Error cambiando estado: " + error.message;
      return;
    }

    statusEl.innerText = "Estado actualizado";
    await cargarEntregas();
  } catch (e) {
    alert("Fallo cambiando estado: " + e.message);
    statusEl.innerText = "Fallo cambiando estado: " + e.message;
  }
};

window.borrarEntrega = async function(id) {
  const confirmar = confirm("¿Seguro que quieres borrar esta entrega?");
  if (!confirmar) return;

  try {
    statusEl.innerText = "Borrando entrega...";

    let query = supabase
      .from("deliveries")
      .delete()
      .eq("id", id);

    if (session.rol === "admin") {
      query = query.eq("empresa_id", session.empresa_id);
    }

    const { error } = await query;

    if (error) {
      alert("Error borrando: " + error.message);
      statusEl.innerText = "Error borrando: " + error.message;
      return;
    }

    statusEl.innerText = "Entrega borrada correctamente";
    await cargarEntregas();
  } catch (e) {
    alert("Fallo borrando: " + e.message);
    statusEl.innerText = "Fallo borrando: " + e.message;
  }
};

searchInput.addEventListener("input", aplicarFiltros);
estadoFilter.addEventListener("change", aplicarFiltros);
urgenteFilter.addEventListener("change", aplicarFiltros);
mozoFilter.addEventListener("change", aplicarFiltros);
trampillaFilter.addEventListener("change", aplicarFiltros);

btnActualizar.addEventListener("click", cargarEntregas);
btnSalir.addEventListener("click", logoutApp);
cerrarFotoBtn.addEventListener("click", cerrarModalFoto);
cerrarEditBtn.addEventListener("click", cerrarEditModal);
cancelarEditBtn.addEventListener("click", cerrarEditModal);
guardarEntregaBtn.addEventListener("click", guardarCambiosEntrega);

photoModal.addEventListener("click", (e) => {
  if (e.target === photoModal) cerrarModalFoto();
});

editModal.addEventListener("click", (e) => {
  if (e.target === editModal) cerrarEditModal();
});

aplicarColorEmpresa();
await cargarInfoCabecera();
await cargarEntregas();
</script>
