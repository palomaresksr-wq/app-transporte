<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login App Transporte</title>
<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  margin:0;
  padding:30px;
}
.card{
  background:#121b2f;
  padding:20px;
  border-radius:10px;
  max-width:500px;
  margin:auto;
}
label{
  display:block;
  margin-top:10px;
}
input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:none;
  box-sizing:border-box;
}
button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#ff7a18;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
#status{
  margin-top:15px;
  white-space:pre-line;
}
</style>
</head>
<body>

<div class="card">
  <h2>Entrada App Transporte</h2>

  <label>Usuario</label>
  <input id="username">

  <label>Contraseña</label>
  <input id="password" type="password">

  <button onclick="entrar()">Entrar</button>

  <div id="status"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://jpnritlcfumjmdpoaytr.supabase.co";
const SUPABASE_KEY = "sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const statusEl = document.getElementById("status");
const usernameEl = document.getElementById("username");
const passwordEl = document.getElementById("password");

// Admin fijo de oficina
const ADMIN_FIJO = {
  username: "oficina",
  password: "1234",
  role: "admin"
};

const sesionGuardada = localStorage.getItem("sesionAppTransporte");
if (sesionGuardada) {
  try {
    const sesion = JSON.parse(sesionGuardada);
    if (sesion.role === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }
  } catch (e) {
    localStorage.removeItem("sesionAppTransporte");
  }
}

async function buscarConductorEnSupabase(username, password) {
  const { data, error } = await supabase
    .from("conductores")
    .select("id, nombre, usuario, password, empresa_id")
    .eq("usuario", username)
    .eq("password", password)
    .limit(1);

  if (error) {
    throw new Error("Error consultando conductores: " + error.message);
  }

  if (!data || data.length === 0) {
    return null;
  }

  return data[0];
}

window.entrar = async function () {
  try {
    const username = usernameEl.value.trim();
    const password = passwordEl.value.trim();

    statusEl.innerText = "Comprobando acceso...";

    if (!username || !password) {
      statusEl.innerText = "Introduce usuario y contraseña";
      return;
    }

    // ADMIN
    if (
      username === ADMIN_FIJO.username &&
      password === ADMIN_FIJO.password
    ) {
      localStorage.setItem(
        "sesionAppTransporte",
        JSON.stringify({
          username: ADMIN_FIJO.username,
          role: "admin"
        })
      );

      window.location.href = "admin.html";
      return;
    }

    // CONDUCTOR DESDE SUPABASE
    const conductor = await buscarConductorEnSupabase(username, password);

    if (!conductor) {
      statusEl.innerText = "Usuario o contraseña incorrectos";
      return;
    }

    const sesion = {
      username: conductor.usuario,
      nombre: conductor.nombre,
      role: "driver",
      conductor_id: conductor.id,
      empresa_id: conductor.empresa_id
    };

    localStorage.setItem("sesionAppTransporte", JSON.stringify(sesion));

    statusEl.innerText = "Acceso correcto";
    window.location.href = "index.html";
  } catch (e) {
    console.error(e);
    statusEl.innerText = "Error: " + e.message;
  }
};

passwordEl.addEventListener("keydown", function(e){
  if (e.key === "Enter") {
    entrar();
  }
});

usernameEl.addEventListener("keydown", function(e){
  if (e.key === "Enter") {
    entrar();
  }
});
</script>

</body>
</html>
