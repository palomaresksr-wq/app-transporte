<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login App Transporte</title>

<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  margin:0;
  padding:30px;
}
.card{
  background:#121b2f;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:auto;
}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}
button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#ff7a18;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
#status{
  margin-top:15px;
}
</style>
</head>
<body>

<div class="card">
  <h2>Login</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <div id="status"></div>
</div>

<script>
function limpiarTodo(){
  try{
    localStorage.removeItem("sesionAppTransporte");
    localStorage.removeItem("albatrans_session_v2");
    localStorage.removeItem("clienteSeleccionadoAppTransporte");
    localStorage.removeItem("cliente_id_actual");
    localStorage.removeItem("cliente_nombre_actual");
    sessionStorage.clear();
  }catch(e){
    console.error(e);
  }
}

function login(){
  const user = document.getElementById("user").value.trim().toLowerCase();
  const pass = document.getElementById("pass").value.trim();

  limpiarTodo();

  if(user === "oficina" && pass === "1234"){
    localStorage.setItem("sesionAppTransporte", JSON.stringify({
      role: "admin_global",
      nombre: "Oficina",
      username: "oficina"
    }));
    window.location.href = "menu-admin.html?t=" + Date.now();
    return;
  }

  if(user === "duttitrans" && pass === "1234"){
    localStorage.setItem("sesionAppTransporte", JSON.stringify({
      role: "admin_global",
      nombre: "DuttiTrans",
      username: "duttitrans"
    }));
    window.location.href = "menu-admin.html?t=" + Date.now();
    return;
  }

  document.getElementById("status").innerText = "Usuario o contraseña incorrectos";
}
</script>

</body>
</html>
