<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Panel Admin - App Transporte</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  margin:0;
  padding:20px;
}

.wrap{
  max-width:1400px;
  margin:0 auto;
}

.topbar{
  background:#121b2f;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

h1{
  margin:0;
  font-size:28px;
}

button, .btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#ff7a18;
  color:#1b0c02;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
}

button.sec, .btn.sec{
  background:#24314f;
  color:white;
}

.card{
  background:#121b2f;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
}

#status{
  margin-top:10px;
  font-weight:bold;
}

.tableWrap{
  overflow:auto;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1400px;
  background:#121b2f;
}

th, td{
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:10px;
  text-align:left;
  vertical-align:top;
  font-size:14px;
}

th{
  background:#18233b;
  position:sticky;
  top:0;
  z-index:1;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  margin-right:6px;
  margin-bottom:4px;
}

.si{
  background:#1f8b4c;
  color:white;
}

.no{
  background:#3a445f;
  color:#cfd8f0;
}

a{
  color:#7db4ff;
}

img.thumb{
  width:90px;
  max-width:90px;
  border-radius:8px;
  display:block;
  cursor:pointer;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.smallBtn{
  padding:8px 10px;
  font-size:12px;
}

.empty{
  opacity:.8;
  padding:20px;
}

.filters{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:10px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}

input[type="checkbox"]{
  width:auto;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:1000;
}

.modal.open{
  display:flex;
}

.modalContent{
  background:#121b2f;
  border-radius:12px;
  padding:20px;
  max-width:900px;
  width:100%;
  max-height:90vh;
  overflow:auto;
}

.modalContent img{
  width:100%;
  border-radius:10px;
}

.muted{
  color:#b7c3dd;
  font-size:13px;
}

.formGrid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:12px;
}

.checkboxRow{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  margin-top:10px;
}

.checkboxRow label{
  display:flex;
  align-items:center;
  gap:8px;
}

.modalActions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

@media (max-width: 700px){
  body{
    padding:12px;
  }

  h1{
    font-size:22px;
  }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <div>
      <h1 id="panelTitle">Panel Admin</h1>
      <div class="muted" id="panelSubtitle">Entregas de conductores</div>
    </div>

    <div class="actions">
      <a class="btn sec" href="factura.html">Facturación</a>
      <button class="sec" onclick="cargarEntregas()">Actualizar</button>
      <button onclick="cerrarSesion()">Salir</button>
    </div>
  </div>

  <div class="card">
    <div class="filters">
      <div>
        <label>Buscar</label>
        <input id="searchInput" placeholder="Conductor, cliente, matrícula, carga, descarga...">
      </div>

      <div>
        <label>Urgente</label>
        <select id="urgenteFilter">
          <option value="">Todos</option>
          <option value="si">Solo urgentes</option>
          <option value="no">No urgentes</option>
        </select>
      </div>

      <div>
        <label>Mozo</label>
        <select id="mozoFilter">
          <option value="">Todos</option>
          <option value="si">Con mozo</option>
          <option value="no">Sin mozo</option>
        </select>
      </div>

      <div>
        <label>Trampilla</label>
        <select id="trampillaFilter">
          <option value="">Todos</option>
          <option value="si">Con trampilla</option>
          <option value="no">Sin trampilla</option>
        </select>
      </div>
    </div>

    <div id="status"></div>
  </div>

  <div class="card">
    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Conductor</th>
            <th>Matrícula</th>
            <th>Cliente</th>
            <th>Lugar de carga</th>
            <th>Lugar de descarga</th>
            <th>Nº entregas</th>
            <th>Bultos</th>
            <th>Kg</th>
            <th>M3</th>
            <th>Observaciones</th>
            <th>Extras</th>
            <th>Foto</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyEntregas">
          <tr>
            <td colspan="15" class="empty">Cargando entregas...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="photoModal" class="modal" onclick="cerrarModalSiFondo(event)">
  <div class="modalContent">
    <div class="actions" style="justify-content:space-between;margin-bottom:12px;">
      <strong>Foto de albarán</strong>
      <button class="sec smallBtn" onclick="cerrarModal()">Cerrar</button>
    </div>
    <img id="modalImg" src="" alt="Foto de entrega">
  </div>
</div>

<div id="editModal" class="modal" onclick="cerrarEditModalSiFondo(event)">
  <div class="modalContent">
    <div class="actions" style="justify-content:space-between;margin-bottom:12px;">
      <strong>Editar entrega</strong>
      <button class="sec smallBtn" onclick="cerrarEditModal()">Cerrar</button>
    </div>

    <div class="formGrid">
      <div>
        <label>Conductor</label>
        <input id="edit_driver_name">
      </div>

      <div>
        <label>Matrícula</label>
        <input id="edit_vehicle_plate">
      </div>

      <div>
        <label>Cliente</label>
        <input id="edit_client_name">
      </div>

      <div>
        <label>Lugar de carga</label>
        <input id="edit_pickup_place">
      </div>

      <div>
        <label>Lugar de descarga</label>
        <input id="edit_dropoff_place">
      </div>

      <div>
        <label>Nº entregas</label>
        <input id="edit_num_entregas" type="number">
      </div>

      <div>
        <label>Bultos</label>
        <input id="edit_bultos" type="number">
      </div>

      <div>
        <label>Kg</label>
        <input id="edit_kg" type="number" step="0.01">
      </div>

      <div>
        <label>M3</label>
        <input id="edit_m3" type="number" step="0.01">
      </div>

      <div>
        <label>Km</label>
        <input id="edit_distance_km" type="number" step="0.01">
      </div>

      <div>
        <label>Precio (€)</label>
        <input id="edit_price_eur" type="number" step="0.01">
      </div>
    </div>

    <div style="margin-top:12px;">
      <label>Observaciones</label>
      <textarea id="edit_observations" rows="4"></textarea>
    </div>

    <div class="checkboxRow">
      <label>
        <input id="edit_mozo" type="checkbox">
        Mozo
      </label>

      <label>
        <input id="edit_trampilla" type="checkbox">
        Trampilla
      </label>

      <label>
        <input id="edit_urgente" type="checkbox">
        Urgente
      </label>
    </div>

    <div class="modalActions">
      <button class="sec" onclick="cerrarEditModal()">Cancelar</button>
      <button onclick="guardarCambiosEntrega()">Guardar cambios</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://jpnritlcfumjmdpoaytr.supabase.co",
  "sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr"
);

const statusEl = document.getElementById("status");
const tbodyEntregas = document.getElementById("tbodyEntregas");
const searchInput = document.getElementById("searchInput");
const urgenteFilter = document.getElementById("urgenteFilter");
const mozoFilter = document.getElementById("mozoFilter");
const trampillaFilter = document.getElementById("trampillaFilter");
const photoModal = document.getElementById("photoModal");
const modalImg = document.getElementById("modalImg");
const panelTitle = document.getElementById("panelTitle");
const panelSubtitle = document.getElementById("panelSubtitle");

const editModal = document.getElementById("editModal");
const editDriverName = document.getElementById("edit_driver_name");
const editVehiclePlate = document.getElementById("edit_vehicle_plate");
const editClientName = document.getElementById("edit_client_name");
const editPickupPlace = document.getElementById("edit_pickup_place");
const editDropoffPlace = document.getElementById("edit_dropoff_place");
const editNumEntregas = document.getElementById("edit_num_entregas");
const editBultos = document.getElementById("edit_bultos");
const editKg = document.getElementById("edit_kg");
const editM3 = document.getElementById("edit_m3");
const editDistanceKm = document.getElementById("edit_distance_km");
const editPriceEur = document.getElementById("edit_price_eur");
const editObservations = document.getElementById("edit_observations");
const editMozo = document.getElementById("edit_mozo");
const editTrampilla = document.getElementById("edit_trampilla");
const editUrgente = document.getElementById("edit_urgente");

const sesion = JSON.parse(localStorage.getItem("sesionAppTransporte") || "null");

if (
  !sesion ||
  (sesion.role !== "admin_global" && sesion.role !== "admin_empresa")
) {
  window.location.href = "login.html";
}

window.cerrarSesion = function(){
  try {
    localStorage.removeItem("sesionAppTransporte");
    localStorage.clear();
    sessionStorage.clear();
  } catch (e) {
    console.error("Error limpiando sesión:", e);
  }

  const destino = "login.html?logout=1&t=" + Date.now();
  window.location.href = destino;
};

let entregasGlobal = [];
let entregaEditandoId = null;
let empresaActual = null;

async function cargarInfoEmpresaActual() {
  try {
    if (sesion.role === "admin_global") {
      panelTitle.innerText = "Panel Admin General";
      panelSubtitle.innerText = "Viendo todas las entregas de todas las empresas";
      empresaActual = null;
      return;
    }

    if (!sesion.empresa_id) {
      panelTitle.innerText = "Panel Admin";
      panelSubtitle.innerText = "No hay empresa asociada a este usuario";
      empresaActual = null;
      return;
    }

    const { data, error } = await supabase
      .from("empresas")
      .select("id,nombre,email,telefono")
      .eq("id", sesion.empresa_id)
      .limit(1);

    if (error) {
      panelTitle.innerText = "Panel Admin Empresa";
      panelSubtitle.innerText = "No se pudo cargar la empresa";
      return;
    }

    const empresa = data && data.length ? data[0] : null;
    empresaActual = empresa;

    panelTitle.innerText = "Panel Admin Empresa";
    panelSubtitle.innerText = empresa
      ? "Empresa: " + (empresa.nombre || "Sin nombre")
      : "Empresa no encontrada";
  } catch (e) {
    console.error(e);
    panelTitle.innerText = "Panel Admin Empresa";
    panelSubtitle.innerText = "Error cargando empresa";
  }
}

function formatearFecha(fechaIso) {
  if (!fechaIso) return "";
  const fecha = new Date(fechaIso);
  if (isNaN(fecha.getTime())) return fechaIso;
  return fecha.toLocaleString("es-ES");
}

function escapeHtml(valor) {
  return String(valor ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function badgeBooleano(activo, texto) {
  return `<span class="badge ${activo ? "si" : "no"}">${texto}: ${activo ? "Sí" : "No"}</span>`;
}

function cumpleFiltroBooleano(valorReal, filtro) {
  if (!filtro) return true;
  if (filtro === "si") return !!valorReal === true;
  if (filtro === "no") return !!valorReal === false;
  return true;
}

function abrirModal(url) {
  modalImg.src = url;
  photoModal.classList.add("open");
}

window.abrirModal = abrirModal;

window.cerrarModal = function() {
  photoModal.classList.remove("open");
  modalImg.src = "";
};

window.cerrarModalSiFondo = function(event) {
  if (event.target === photoModal) {
    cerrarModal();
  }
};

window.cerrarEditModal = function() {
  editModal.classList.remove("open");
  entregaEditandoId = null;
};

window.cerrarEditModalSiFondo = function(event) {
  if (event.target === editModal) {
    cerrarEditModal();
  }
};

function normalizarNumero(valor) {
  if (valor === null || valor === undefined || valor === "") return null;
  const n = Number(String(valor).replace(",", "."));
  return Number.isNaN(n) ? null : n;
}

function puedeEditarEntrega(entrega) {
  if (sesion.role === "admin_global") return true;
  if (sesion.role === "admin_empresa") {
    return String(entrega.empresa_id || "") === String(sesion.empresa_id || "");
  }
  return false;
}

function renderEntregas(lista) {
  if (!lista.length) {
    tbodyEntregas.innerHTML = `
      <tr>
        <td colspan="15" class="empty">No hay entregas que coincidan con el filtro.</td>
      </tr>
    `;
    return;
  }

  tbodyEntregas.innerHTML = lista.map(entrega => {
    const extras = `
      ${badgeBooleano(entrega.mozo, "Mozo")}
      ${badgeBooleano(entrega.trampilla, "Trampilla")}
      ${badgeBooleano(entrega.urgente, "Urgente")}
    `;

    const fotoHtml = entrega.photo_url
      ? `
        <a href="${escapeHtml(entrega.photo_url)}" target="_blank" rel="noopener noreferrer">Ver</a>
        <br><br>
        <img class="thumb" src="${escapeHtml(entrega.photo_url)}" alt="Foto entrega" onclick="abrirModal('${escapeHtml(entrega.photo_url)}')">
      `
      : "Sin foto";

    const acciones = puedeEditarEntrega(entrega)
      ? `
        <div class="actions">
          <button class="smallBtn sec" onclick="editarEntrega('${entrega.id}')">Editar</button>
          <button class="smallBtn sec" onclick="borrarEntrega('${entrega.id}')">Borrar</button>
        </div>
      `
      : `<span class="muted">Sin permiso</span>`;

    return `
      <tr>
        <td>${formatearFecha(entrega.created_at)}</td>
        <td>${escapeHtml(entrega.driver_name)}</td>
        <td>${escapeHtml(entrega.vehicle_plate)}</td>
        <td>${escapeHtml(entrega.client_name)}</td>
        <td>${escapeHtml(entrega.pickup_place)}</td>
        <td>${escapeHtml(entrega.dropoff_place)}</td>
        <td>${escapeHtml(entrega.num_entregas)}</td>
        <td>${escapeHtml(entrega.bultos)}</td>
        <td>${escapeHtml(entrega.kg)}</td>
        <td>${escapeHtml(entrega.m3)}</td>
        <td>${escapeHtml(entrega.observations)}</td>
        <td>${extras}</td>
        <td>${fotoHtml}</td>
        <td>${entrega.price_eur != null ? Number(entrega.price_eur).toFixed(2) + " €" : ""}</td>
        <td>${acciones}</td>
      </tr>
    `;
  }).join("");
}

function aplicarFiltros() {
  const texto = searchInput.value.trim().toLowerCase();

  const filtradas = entregasGlobal.filter(entrega => {
    const bloqueTexto = [
      entrega.driver_name,
      entrega.vehicle_plate,
      entrega.client_name,
      entrega.pickup_place,
      entrega.dropoff_place,
      entrega.num_entregas,
      entrega.observations
    ]
    .map(v => (v || "").toString().toLowerCase())
    .join(" ");

    const pasaTexto = !texto || bloqueTexto.includes(texto);
    const pasaUrgente = cumpleFiltroBooleano(entrega.urgente, urgenteFilter.value);
    const pasaMozo = cumpleFiltroBooleano(entrega.mozo, mozoFilter.value);
    const pasaTrampilla = cumpleFiltroBooleano(entrega.trampilla, trampillaFilter.value);

    return pasaTexto && pasaUrgente && pasaMozo && pasaTrampilla;
  });

  renderEntregas(filtradas);
}

async function cargarEntregas() {
  try {
    statusEl.innerText = "Cargando entregas...";

    let query = supabase
      .from("deliveries")
      .select(`
        id,
        empresa_id,
        created_at,
        driver_name,
        vehicle_plate,
        client_name,
        pickup_place,
        dropoff_place,
        num_entregas,
        bultos,
        kg,
        m3,
        observations,
        mozo,
        trampilla,
        urgente,
        distance_km,
        price_eur,
        photo_url
      `)
      .order("created_at", { ascending: false });

    if (sesion.role === "admin_empresa") {
      query = query.eq("empresa_id", sesion.empresa_id);
    }

    const { data, error } = await query;

    if (error) {
      statusEl.innerText = "Error cargando entregas: " + error.message;
      tbodyEntregas.innerHTML = `
        <tr>
          <td colspan="15" class="empty">No se pudieron cargar las entregas.</td>
        </tr>
      `;
      return;
    }

    entregasGlobal = data || [];
    aplicarFiltros();

    if (sesion.role === "admin_empresa") {
      statusEl.innerText = "Entregas de tu empresa: " + entregasGlobal.length;
    } else {
      statusEl.innerText = "Entregas cargadas: " + entregasGlobal.length;
    }
  } catch (e) {
    statusEl.innerText = "Fallo cargando entregas: " + e.message;
    tbodyEntregas.innerHTML = `
      <tr>
        <td colspan="15" class="empty">Error inesperado al cargar entregas.</td>
      </tr>
    `;
  }
}

window.cargarEntregas = cargarEntregas;

window.editarEntrega = function(id) {
  const entrega = entregasGlobal.find(e => e.id === id);

  if (!entrega) {
    alert("No se encontró la entrega");
    return;
  }

  if (!puedeEditarEntrega(entrega)) {
    alert("No tienes permiso para editar esta entrega");
    return;
  }

  entregaEditandoId = id;

  editDriverName.value = entrega.driver_name || "";
  editVehiclePlate.value = entrega.vehicle_plate || "";
  editClientName.value = entrega.client_name || "";
  editPickupPlace.value = entrega.pickup_place || "";
  editDropoffPlace.value = entrega.dropoff_place || "";
  editNumEntregas.value = entrega.num_entregas ?? "";
  editBultos.value = entrega.bultos ?? "";
  editKg.value = entrega.kg ?? "";
  editM3.value = entrega.m3 ?? "";
  editDistanceKm.value = entrega.distance_km ?? "";
  editPriceEur.value = entrega.price_eur ?? "";
  editObservations.value = entrega.observations || "";
  editMozo.checked = !!entrega.mozo;
  editTrampilla.checked = !!entrega.trampilla;
  editUrgente.checked = !!entrega.urgente;

  editModal.classList.add("open");
};

window.guardarCambiosEntrega = async function() {
  if (!entregaEditandoId) {
    alert("No hay ninguna entrega seleccionada");
    return;
  }

  const entregaOriginal = entregasGlobal.find(e => e.id === entregaEditandoId);

  if (!entregaOriginal) {
    alert("No se encontró la entrega original");
    return;
  }

  if (!puedeEditarEntrega(entregaOriginal)) {
    alert("No tienes permiso para editar esta entrega");
    return;
  }

  try {
    statusEl.innerText = "Guardando cambios...";

    const datosActualizados = {
      driver_name: editDriverName.value.trim() || null,
      vehicle_plate: editVehiclePlate.value.trim() || null,
      client_name: editClientName.value.trim() || null,
      pickup_place: editPickupPlace.value.trim() || null,
      dropoff_place: editDropoffPlace.value.trim() || null,
      num_entregas: normalizarNumero(editNumEntregas.value),
      bultos: normalizarNumero(editBultos.value),
      kg: normalizarNumero(editKg.value),
      m3: normalizarNumero(editM3.value),
      distance_km: normalizarNumero(editDistanceKm.value),
      price_eur: normalizarNumero(editPriceEur.value),
      observations: editObservations.value.trim() || null,
      mozo: editMozo.checked,
      trampilla: editTrampilla.checked,
      urgente: editUrgente.checked
    };

    let query = supabase
      .from("deliveries")
      .update(datosActualizados)
      .eq("id", entregaEditandoId);

    if (sesion.role === "admin_empresa") {
      query = query.eq("empresa_id", sesion.empresa_id);
    }

    const { error } = await query;

    if (error) {
      alert("Error guardando cambios: " + error.message);
      statusEl.innerText = "Error guardando cambios: " + error.message;
      return;
    }

    cerrarEditModal();
    statusEl.innerText = "Entrega actualizada correctamente";
    await cargarEntregas();
  } catch (e) {
    alert("Fallo guardando cambios: " + e.message);
    statusEl.innerText = "Fallo guardando cambios: " + e.message;
  }
};

async function borrarEntrega(id) {
  const entregaOriginal = entregasGlobal.find(e => e.id === id);

  if (!entregaOriginal) {
    alert("No se encontró la entrega");
    return;
  }

  if (!puedeEditarEntrega(entregaOriginal)) {
    alert("No tienes permiso para borrar esta entrega");
    return;
  }

  const confirmar = confirm("¿Seguro que quieres borrar esta entrega?");
  if (!confirmar) return;

  try {
    statusEl.innerText = "Borrando entrega...";

    let query = supabase
      .from("deliveries")
      .delete()
      .eq("id", id);

    if (sesion.role === "admin_empresa") {
      query = query.eq("empresa_id", sesion.empresa_id);
    }

    const { error } = await query;

    if (error) {
      alert("Error borrando: " + error.message);
      statusEl.innerText = "Error borrando: " + error.message;
      return;
    }

    statusEl.innerText = "Entrega borrada correctamente";
    await cargarEntregas();
  } catch (e) {
    alert("Fallo borrando: " + e.message);
    statusEl.innerText = "Fallo borrando: " + e.message;
  }
}

window.borrarEntrega = borrarEntrega;

searchInput.addEventListener("input", aplicarFiltros);
urgenteFilter.addEventListener("change", aplicarFiltros);
mozoFilter.addEventListener("change", aplicarFiltros);
trampillaFilter.addEventListener("change", aplicarFiltros);

await cargarInfoEmpresaActual();
cargarEntregas();
</script>
</body>
</html>
