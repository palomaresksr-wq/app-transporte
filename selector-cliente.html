<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Selecciona cliente</title>

<style>
:root{
  --bg:#0b1220;
  --card:#121b2f;
  --soft:#18233b;
  --accent:#ff7a18;
  --text:#ffffff;
  --muted:#b7c3dd;
  --circle:#ffffff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#0b1220 0%, #121b2f 45%, #18233b 100%);
  color:var(--text);
  min-height:100vh;
}
.wrap{
  max-width:460px;
  margin:0 auto;
  padding:24px 18px 40px;
}
.top{
  text-align:center;
  margin-bottom:24px;
}
.top h1{
  margin:0;
  font-size:30px;
  font-weight:800;
}
.top p{
  margin:10px 0 0;
  color:var(--muted);
  font-size:14px;
}
.clientList{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}
.clientBtn{
  width:190px;
  height:190px;
  border:none;
  border-radius:50%;
  background:var(--circle);
  color:#111;
  cursor:pointer;
  box-shadow:0 8px 22px rgba(0,0,0,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  transition:transform .15s ease, box-shadow .15s ease;
}
.clientBtn:active{transform:scale(.98)}
.clientBtn:hover{box-shadow:0 12px 28px rgba(0,0,0,.35)}
.clientInner{text-align:center;width:100%}
.clientLogoText{
  font-size:30px;
  font-weight:900;
  letter-spacing:.5px;
  line-height:1.05;
  color:#111;
  word-break:break-word;
}
.clientSub{
  margin-top:8px;
  font-size:12px;
  color:#555;
  font-weight:700;
}
.clientLogoMini{
  font-size:20px;
  font-weight:900;
  color:#111;
  word-break:break-word;
}
.clientLogoOrange{color:var(--accent)}
.footerBox{
  margin-top:28px;
  text-align:center;
}
.backBtn{
  display:inline-block;
  text-decoration:none;
  background:#24314f;
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  font-weight:bold;
}
.infoBox{
  margin:0 auto 22px;
  max-width:340px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:12px 14px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}
.statusBox{
  margin:0 auto 22px;
  max-width:340px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
  white-space:pre-line;
}
.emptyBox{
  margin:20px auto 0;
  max-width:340px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:18px 16px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}
@media (max-width:420px){
  .clientBtn{
    width:170px;
    height:170px;
  }
  .clientLogoText{
    font-size:26px;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="top">
    <h1>Selecciona cliente</h1>
    <p>Pulsa el cliente para registrar la entrega</p>
  </div>

  <div class="infoBox" id="infoEmpresa" style="display:none;"></div>

  <div class="statusBox" id="status">Cargando clientes...</div>

  <div class="clientList" id="clientList"></div>

  <div class="footerBox">
    <a href="menu-conductor.html" class="backBtn">Volver</a>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://jpnritlcfumjmdpoaytr.supabase.co";
const SUPABASE_KEY = "sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const statusEl = document.getElementById("status");
const clientListEl = document.getElementById("clientList");
const infoEmpresaEl = document.getElementById("infoEmpresa");

const sesionRaw = localStorage.getItem("sesionAppTransporte");
let sesion = null;

try {
  sesion = sesionRaw ? JSON.parse(sesionRaw) : null;
} catch (e) {
  sesion = null;
}

if (!sesion || sesion.role !== "driver") {
  window.location.replace("login.html?forzar=1");
}

const EMPRESA_ID = sesion?.empresa_id || null;

if (!EMPRESA_ID) {
  statusEl.innerText = "Este usuario no tiene una empresa asignada";
  clientListEl.innerHTML = "";
  throw new Error("Usuario sin empresa_id");
}

function guardarClienteSeleccionado(cliente) {
  localStorage.setItem("clienteSeleccionadoAppTransporte", cliente.nombre || "");
  localStorage.setItem("cliente_id_actual", cliente.id);
  localStorage.setItem("cliente_nombre_actual", cliente.nombre || "");
}

function limpiarTexto(texto) {
  return String(texto || "").replace(/[<>"']/g, "");
}

function obtenerEstiloCliente(nombre) {
  const n = String(nombre || "").trim().toUpperCase();

  if (n === "INDITEX") {
    return {
      html: `<div class="clientLogoText">INDITEX</div>`
    };
  }

  if (n === "GALITRANS") {
    return {
      html: `<div class="clientLogoMini">GALITRANS</div>`
    };
  }

  if (n === "COTRANSA") {
    return {
      html: `
        <div class="clientLogoText" style="font-size:22px;">COTRANSA</div>
        <div class="clientSub">GROUP</div>
      `
    };
  }

  if (n === "SOTRACOM") {
    return {
      html: `<div class="clientLogoText clientLogoOrange" style="font-size:24px;">SOTRACOM</div>`
    };
  }

  if (n === "OPERINTER") {
    return {
      html: `<div class="clientLogoText" style="font-size:22px;">OPERINTER</div>`
    };
  }

  if (n === "GETRAES") {
    return {
      html: `<div class="clientLogoText" style="font-size:22px;">GETRAES</div>`
    };
  }

  if (n === "ALBEPET") {
    return {
      html: `<div class="clientLogoText" style="font-size:24px;color:#2c9ed8;">ALBEPET</div>`
    };
  }

  if (n === "OPLOG") {
    return {
      html: `<div class="clientLogoText" style="font-size:24px;">OPLOG</div>`
    };
  }

  if (n === "DUTTITRANS") {
    return {
      html: `<div class="clientLogoText" style="font-size:22px;">DUTTITRANS</div>`
    };
  }

  const textoSeguro = limpiarTexto(nombre);
  return {
    html: `<div class="clientLogoText" style="font-size:24px;">${textoSeguro}</div>`
  };
}

function renderClientes(clientes) {
  clientListEl.innerHTML = "";

  clientes.forEach(cliente => {
    const btn = document.createElement("button");
    btn.className = "clientBtn";
    btn.type = "button";

    const inner = document.createElement("div");
    inner.className = "clientInner";
    inner.innerHTML = obtenerEstiloCliente(cliente.nombre).html;

    btn.appendChild(inner);

    btn.addEventListener("click", function() {
      guardarClienteSeleccionado(cliente);
      window.location.href = "conductor.html";
    });

    clientListEl.appendChild(btn);
  });
}

async function cargarNombreEmpresa() {
  try {
    const { data, error } = await supabase
      .from("empresas")
      .select("id, nombre")
      .eq("id", EMPRESA_ID)
      .limit(1);

    if (error) {
      console.error(error);
      return;
    }

    if (data && data.length) {
      infoEmpresaEl.style.display = "block";
      infoEmpresaEl.innerText = "Empresa activa: " + (data[0].nombre || "");
    }
  } catch (e) {
    console.error(e);
  }
}

async function cargarClientes() {
  try {
    statusEl.innerText = "Cargando clientes...";

    const { data, error } = await supabase
      .from("clientes")
      .select("id, nombre, empresa_id")
      .eq("empresa_id", EMPRESA_ID)
      .order("nombre", { ascending: true });

    if (error) {
      throw error;
    }

    if (!data || !data.length) {
      statusEl.innerHTML = `
        <div class="emptyBox">
          No hay clientes dados de alta para esta empresa
        </div>
      `;
      clientListEl.innerHTML = "";
      return;
    }

    statusEl.innerText = "";
    renderClientes(data);
  } catch (e) {
    console.error(e);
    statusEl.innerHTML = `
      <div class="emptyBox">
        Error al cargar clientes
      </div>
    `;
    clientListEl.innerHTML = "";
  }
}

await cargarNombreEmpresa();
await cargarClientes();
</script>

</body>
</html>
