window.leerFotoAutomatica = async function(){

let status = document.getElementById("status");

document.getElementById("cameraInput").files[0] ||

if(!photoFile){
return;
}

status.innerText = "Subiendo foto y leyendo albarán...";

let fileExt = photoFile.name.split(".").pop();

let { error: uploadError } = await supabase
.storage
.from("pod")
.upload(fileName, photoFile, { upsert: true });

if(uploadError){

window.guardarEntrega = async function(){

let bultos = document.getElementById("bultos").value;
let kg = document.getElementById("kg").value;

document.getElementById("cameraInput").files[0] ||
document.getElementById("galleryInput").files[0];

kg: kg,
m3: m3,
