<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App Transporte</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
padding:30px;
}

.card{
background:#121b2f;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

label{
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:none;
box-sizing:border-box;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#ff7a18;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

#status{
margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<div style="margin-bottom:15px">
Usuario: <span id="currentUser"></span>
<button onclick="cerrarSesion()">Salir</button>
</div>

<h2>Nueva entrega</h2>

<label>Matrícula</label>
<input id="vehicle">

<label>Cliente frecuente</label>
<select id="clientSelect"></select>

<label>Cliente</label>
<input id="client">

<label>Carga frecuente</label>
<select id="pickupSelect"></select>

<label>Lugar de carga</label>
<input id="pickupPlace">

<label>Descarga frecuente</label>
<select id="dropoffSelect"></select>

<label>Lugar de descarga</label>
<input id="dropoffPlace">

<label>Bultos</label>
<input id="bultos" type="number">

<label>Kg</label>
<input id="kg" type="number">

<label>M3</label>
<input id="m3" type="number">

<label>Observaciones</label>
<textarea id="observations"></textarea>

<label><input id="mozo" type="checkbox"> Mozo</label>
<label><input id="trampilla" type="checkbox"> Trampilla</label>
<label><input id="urgente" type="checkbox"> Urgente</label>

<label>Foto albarán</label>

<button onclick="document.getElementById('cameraInput').click()">📷 Foto</button>

<input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none">

<img id="previewFoto" style="max-width:100%;margin-top:10px;display:none">

<button onclick="guardarEntrega()">Guardar entrega</button>

<div id="status"></div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase = createClient(
"https://jpnritlcfumjmdpoaytr.supabase.co",
"sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr"
)

const statusEl=document.getElementById("status")

const clientSelect=document.getElementById("clientSelect")
const pickupSelect=document.getElementById("pickupSelect")
const dropoffSelect=document.getElementById("dropoffSelect")

const clientInput=document.getElementById("client")
const pickupInput=document.getElementById("pickupPlace")
const dropoffInput=document.getElementById("dropoffPlace")

const preview=document.getElementById("previewFoto")
const cameraInput=document.getElementById("cameraInput")

let ultimaPhotoUrl=null

cameraInput.addEventListener("change",async ()=>{
const file=cameraInput.files[0]
preview.src=URL.createObjectURL(file)
preview.style.display="block"

const fileName=Date.now()+".jpg"

await supabase.storage.from("pod").upload(fileName,file,{upsert:true})

ultimaPhotoUrl="https://jpnritlcfumjmdpoaytr.supabase.co/storage/v1/object/public/pod/"+fileName
})

async function cargarFrecuentes(){

const clients=await supabase.from("frequent_clients").select("name").order("name")

clientSelect.innerHTML="<option></option>"
clients.data.forEach(c=>{
const o=document.createElement("option")
o.value=c.name
o.textContent=c.name
clientSelect.appendChild(o)
})

const pickups=await supabase.from("frequent_pickups").select("name").order("name")

pickupSelect.innerHTML="<option></option>"
pickups.data.forEach(p=>{
const o=document.createElement("option")
o.value=p.name
o.textContent=p.name
pickupSelect.appendChild(o)
})

const dropoffs=await supabase.from("frequent_dropoffs").select("name").order("name")

dropoffSelect.innerHTML="<option></option>"
dropoffs.data.forEach(d=>{
const o=document.createElement("option")
o.value=d.name
o.textContent=d.name
dropoffSelect.appendChild(o)
})

}

clientSelect.onchange=()=>clientInput.value=clientSelect.value
pickupSelect.onchange=()=>pickupInput.value=pickupSelect.value
dropoffSelect.onchange=()=>dropoffInput.value=dropoffSelect.value

async function guardarFrecuentes(){

await supabase.from("frequent_clients").upsert({name:clientInput.value},{onConflict:"name"})

await supabase.from("frequent_pickups").upsert({name:pickupInput.value},{onConflict:"name"})

await supabase.from("frequent_dropoffs").upsert({name:dropoffInput.value},{onConflict:"name"})

}

window.guardarEntrega=async function(){

statusEl.innerText="Guardando..."

await guardarFrecuentes()

const {error}=await supabase.from("deliveries").insert({

driver_name:"conductor",

vehicle_plate:document.getElementById("vehicle").value,

client_name:clientInput.value,

pickup_place:pickupInput.value,

dropoff_place:dropoffInput.value,

bultos:parseInt(document.getElementById("bultos").value||0),

kg:parseFloat(document.getElementById("kg").value||0),

m3:parseFloat(document.getElementById("m3").value||0),

observations:document.getElementById("observations").value,

mozo:document.getElementById("mozo").checked,

trampilla:document.getElementById("trampilla").checked,

urgente:document.getElementById("urgente").checked,

photo_url:ultimaPhotoUrl

})

if(error){
statusEl.innerText="Error: "+error.message
return
}

statusEl.innerText="Entrega guardada"

}

cargarFrecuentes()

</script>

</body>
</html>
