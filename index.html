<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>App Transporte</title>

<style>

body{
font-family: Arial;
background:#0b1220;
color:white;
margin:0;
padding:30px;
}

.card{
background:#121b2f;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

label{
display:block;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:none;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#ff7a18;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

#status{
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h2>Nueva entrega</h2>

<label>Conductor</label>
<input id="driver">

<label>Cliente</label>
<input id="client">

<label>Dirección</label>
<input id="address">

<label>Código Postal</label>
<input id="postal">

<label>Bultos</label>
<input id="bultos" type="number">

<label>Kg</label>
<input id="kg" type="number">

<label>M3</label>
<input id="m3" type="number">
  
<label>Foto albarán</label>
<input id="photo" type="file" accept="image/*" capture="environment">
  
<button onclick="guardarEntrega()">Guardar entrega</button>

<div id="status"></div>

</div>

<script type="module">

  const googleVisionAPI = "AIzaSyCMB0MkCxctR5Ms7H9XylseosGHSdpbNkI";

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  async function leerAlbaranOCR(imageUrl){
  const response = await fetch(
    `https://vision.googleapis.com/v1/images:annotate?key=${googleVisionAPI}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        requests: [{
          image: { source: { imageUri: imageUrl } },
          features: [{ type: "TEXT_DETECTION" }]
        }]
      })
    }
  );

  const data = await response.json();

  if (!data.responses || !data.responses[0]) {
    console.log("OCR sin respuesta válida", data);
    return;
  }

  const texto = data.responses[0]?.fullTextAnnotation?.text || "";
  console.log("OCR TEXTO:", texto);

  extraerDatos(texto);
}

function extraerDatos(texto){
  const limpio = texto.replace(/\n/g, " ");

  const bultos = limpio.match(/BULTOS\s*:?\s*(\d+)/i);
  const kg = limpio.match(/Kgs?\.?\s*:?\s*([\d.,]+)/i);
  const m3 = limpio.match(/Vol.*?\(m3\)\s*:?\s*([\d.,]+)/i);

  if (bultos) {
    document.getElementById("bultos").value = bultos[1];
  }

  if (kg) {
    document.getElementById("kg").value = kg[1].replace(",", ".");
  }

  if (m3) {
    document.getElementById("m3").value = m3[1].replace(",", ".");
  }
}

const supabase = createClient(
"https://jpnritlcfumjmdpoaytr.supabase.co",
"sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr"
);

window.guardarEntrega = async function(){

let driver = document.getElementById("driver").value;
let client = document.getElementById("client").value;
let address = document.getElementById("address").value;
let postal = document.getElementById("postal").value;

let bultos = document.getElementById("bultos").value;
let kg = document.getElementById("kg").value;
let m3 = document.getElementById("m3").value;

let status = document.getElementById("status");

status.innerText = "Guardando...";
  
// subir foto si hay
let photoFile = document.getElementById("photo").files[0];
let photo_url = null;

if(photoFile){

status.innerText = "Subiendo foto...";

let fileExt = photoFile.name.split(".").pop();
let fileName = Date.now() + "." + fileExt;

let { error: uploadError } = await supabase
.storage
.from("pod")
.upload(fileName, photoFile);

if(uploadError){
status.innerText = "Error subiendo foto: " + uploadError.message;
return;
}

photo_url = "https://jpnritlcfumjmdpoaytr.supabase.co/storage/v1/object/public/pod/" + fileName;

  await leerAlbaranOCR(photo_url);
}

// guardar entrega
let { error } = await supabase
.from("deliveries")
.insert({
driver_name: driver,
client_name: client,
address: address,
postal_code: postal,
bultos: bultos,
kg: kg,
m3: m3,
distance_km: 0,
price_eur: 0,
photo_url: photo_url
});

if(error){

status.innerText = "Error: " + error.message;

}else{

status.innerText = "Entrega guardada correctamente";

}

}

</script>

</body>
</html>
