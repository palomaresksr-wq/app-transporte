<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(

  "sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr"
);

const statusEl = document.getElementById("status");
const cameraInput = document.getElementById("cameraInput");
const galleryInput = document.getElementById("galleryInput");
const driverInput = document.getElementById("driver");
const clientInput = document.getElementById("client");
const addressInput = document.getElementById("address");
const postalInput = document.getElementById("postal");
const bultosInput = document.getElementById("bultos");
const kgInput = document.getElementById("kg");
const m3Input = document.getElementById("m3");
const clientSelect = document.getElementById("clientSelect");

const clientesFrecuentes = [
  {
    nombre: "OPERINTER",
    direccion: "Calle ejemplo 1",
    cp: "28022"
  },
  {
    nombre: "cotransa",
    direccion: "calle foxtrot",
    cp: "28823"
  },
  {
    nombre: "Albepet",
    direccion: "calle morse",
    cp: "28906"
  }
];
clientesFrecuentes.forEach(cliente => {
  const option = document.createElement("option");
  option.value = cliente.nombre;
  option.textContent = cliente.nombre;
  clientSelect.appendChild(option);
});

clientSelect.addEventListener("change", () => {

  const seleccionado = clientesFrecuentes.find(
    c => c.nombre === clientSelect.value
  );

  if (!seleccionado) return;

  clientInput.value = seleccionado.nombre;
  addressInput.value = seleccionado.direccion;
  postalInput.value = seleccionado.cp;

});
  
let ultimaPhotoUrl = null;

  function obtenerClientesFrecuentes() {
  const guardados = localStorage.getItem("clientesFrecuentes");
  return guardados ? JSON.parse(guardados) : [];
}

function guardarClientesFrecuentes(lista) {
  localStorage.setItem("clientesFrecuentes", JSON.stringify(lista));
}

function cargarClientesFrecuentesEnSelect() {
  const clientes = obtenerClientesFrecuentes();

  clientSelect.innerHTML = '<option value="">Seleccionar cliente frecuente</option>';

  clientes.forEach(cliente => {
    const option = document.createElement("option");
    option.value = cliente.nombre;
    option.textContent = cliente.nombre;
    clientSelect.appendChild(option);
  });
}

function guardarClienteSiEsNuevo() {
  const nombre = clientInput.value.trim();
  const direccion = addressInput.value.trim();
  const cp = postalInput.value.trim();

  if (!nombre || !direccion || !cp) return;

  const clientes = obtenerClientesFrecuentes();

  const yaExiste = clientes.some(
    c => c.nombre.toLowerCase() === nombre.toLowerCase()
  );

  if (yaExiste) return;

  clientes.push({
    nombre: nombre,
    direccion: direccion,
    cp: cp
  });

  guardarClientesFrecuentes(clientes);
  cargarClientesFrecuentesEnSelect();
}

clientSelect.addEventListener("change", () => {
  const clientes = obtenerClientesFrecuentes();

  const seleccionado = clientes.find(
    c => c.nombre === clientSelect.value
  );

  if (!seleccionado) return;

  clientInput.value = seleccionado.nombre;
  addressInput.value = seleccionado.direccion;
  postalInput.value = seleccionado.cp;
});

cargarClientesFrecuentesEnSelect();

function getSelectedPhotoFile() {
  return cameraInput.files[0] || galleryInput.files[0] || null;
}

async function subirFoto(photoFile, prefix = "") {
  const fileExt = (photoFile.name.split(".").pop() || "jpg").toLowerCase();
  const fileName = `${prefix}${Date.now()}.${fileExt}`;

  const { error } = await supabase
    .storage
    .from("pod")
    .upload(fileName, photoFile, { upsert: true });

  if (error) {
    throw new Error("Error subiendo foto: " + error.message);
  }

  return "https://jpnritlcfumjmdpoaytr.supabase.co/storage/v1/object/public/pod/" + fileName;
}

// OCR DESACTIVADO DE MOMENTO POR SEGURIDAD

}

function extraerDatos(_texto) {
  // OCR desactivado temporalmente
}

async function leerFotoAutomatica() {
  try {
    const photoFile = getSelectedPhotoFile();

    if (!photoFile) {
      statusEl.innerText = "No se ha seleccionado ninguna foto";
      return;
    }

    statusEl.innerText = "He detectado la foto";
    
    let preview = document.getElementById("previewFoto");
    preview.src = URL.createObjectURL(photoFile);
    preview.style.display = "block";
    
    await new Promise(r => setTimeout(r, 300));

    ultimaPhotoUrl = await subirFoto(photoFile, "preview-");

    statusEl.innerText = "Foto subida correctamente";
  } catch (e) {
    statusEl.innerText = e.message;
  }
}

cameraInput.addEventListener("change", leerFotoAutomatica);
galleryInput.addEventListener("change", leerFotoAutomatica);

window.guardarEntrega = async function () {
  try {
    statusEl.innerText = "Guardando...";

    if (!driverInput.value || !clientInput.value || !addressInput.value || !postalInput.value) {
  statusEl.innerText = "Faltan conductor, cliente, dirección o código postal";
  return;
}

    if (!driverInput.value || !clientInput.value || !addressInput.value || !postalInput.value) {
  statusEl.innerText = "Faltan conductor, cliente, dirección o código postal";
  return;
}

    const photoFile = getSelectedPhotoFile();
let photo_url = ultimaPhotoUrl;

if (photoFile && !photo_url) {
  photo_url = await subirFoto(photoFile);
}

    const { error } = await supabase
      .from("deliveries")
      .insert({
        driver_name: driverInput.value,
        client_name: clientInput.value,
        address: addressInput.value,
        postal_code: postalInput.value,
        bultos: bultosInput.value ? parseInt(bultosInput.value, 10) : null,
        kg: kgInput.value ? parseFloat(kgInput.value.replace(",", ".")) : null,
        m3: m3Input.value ? parseFloat(m3Input.value.replace(",", ".")) : null,
        distance_km: 0,
        price_eur: 0,
        photo_url: photo_url
      });

    if (error) {
      statusEl.innerText = "Error: " + error.message;
      return;
    }

   statusEl.innerText = "Entrega guardada correctamente";
    guardarClienteSiEsNuevo();

    document.getElementById("previewFoto").style.display = "none";

driverInput.value = "";
clientInput.value = "";
addressInput.value = "";
postalInput.value = "";
bultosInput.value = "";
kgInput.value = "";
m3Input.value = "";
cameraInput.value = "";
galleryInput.value = "";
ultimaPhotoUrl = null;

} catch (e) {
    statusEl.innerText = e.message;
  }
};
</script>
