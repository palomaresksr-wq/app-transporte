<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>App Transporte</title>

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  margin:0;
  padding:30px;
}

.card{
  background:#121b2f;
  padding:20px;
  border-radius:10px;
  max-width:500px;
  margin:auto;
}

label{
  display:block;
  margin-top:10px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:6px;
  border:none;
  box-sizing:border-box;
}

input[type="checkbox"]{
  width:auto;
  margin:0;
}

button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#ff7a18;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

#status{
  margin-top:15px;
  font-weight:bold;
  white-space:pre-line;
}

.selectorSecundario{
  background:#0f1a2e;
  color:#fff;
}
</style>
</head>

<body>

<div class="card">

  <div id="sessionBar" style="margin-bottom:15px;padding:10px;background:#0f1a2e;border-radius:8px;">
    Usuario: <span id="currentUser"></span>
    <button type="button" onclick="cerrarSesion()" style="margin-top:10px;">Salir</button>
  </div>

  <h2>Nueva entrega</h2>

  <label>Matrícula frecuente</label>
  <select id="vehicleSelect" class="selectorSecundario">
    <option value="">Seleccionar matrícula frecuente</option>
  </select>

  <label>Matrícula vehículo</label>
  <input id="vehicle" placeholder="Ej: 1234ABC">

  <label>Cliente frecuente</label>
  <select id="clientSelect" class="selectorSecundario">
    <option value="">Seleccionar cliente frecuente</option>
  </select>

  <label>Cliente</label>
  <input id="client" placeholder="Nombre del cliente">

  <label>Lugar de carga frecuente</label>
  <select id="pickupSelect" class="selectorSecundario">
    <option value="">Seleccionar lugar de carga frecuente</option>
  </select>

  <label>Lugar de carga</label>
  <input id="pickupPlace" placeholder="Dirección o empresa de recogida">

  <label>Lugar de descarga frecuente</label>
  <select id="dropoffSelect" class="selectorSecundario">
    <option value="">Seleccionar lugar de descarga frecuente</option>
  </select>

  <label>Lugar de descarga</label>
  <input id="dropoffPlace" placeholder="Dirección o empresa de descarga">

  <label>Bultos</label>
  <input id="bultos" type="number">

  <label>Kg</label>
  <input id="kg" type="number">

  <label>M3</label>
  <input id="m3" type="number">

  <label>Observaciones</label>
  <textarea id="observations" rows="3" placeholder="Tiempo de espera, averías, nº bultos, etc."></textarea>

  <div style="margin-top:15px;display:flex;flex-direction:column;gap:10px;">
    <label style="display:flex;align-items:center;gap:8px;margin-top:0;">
      <input id="mozo" type="checkbox">
      Mozo
    </label>

    <label style="display:flex;align-items:center;gap:8px;margin-top:0;">
      <input id="trampilla" type="checkbox">
      Trampilla
    </label>

    <label style="display:flex;align-items:center;gap:8px;margin-top:0;">
      <input id="urgente" type="checkbox">
      Urgente
    </label>
  </div>

  <label>Foto albarán</label>

  <button type="button" onclick="document.getElementById('cameraInput').click()">
    📷 Hacer foto
  </button>

  <button type="button" onclick="document.getElementById('galleryInput').click()">
    🖼 Elegir de galería
  </button>

  <input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none">
  <input id="galleryInput" type="file" accept="image/*" style="display:none">

  <img id="previewFoto" style="max-width:100%;margin-top:10px;display:none;border-radius:8px;">

  <button onclick="guardarEntrega()">Guardar entrega</button>

  <div id="status"></div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://jpnritlcfumjmdpoaytr.supabase.co";
const SUPABASE_KEY = "sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
console.log("Supabase conectado");

const FALLBACK_EMPRESA_ID = "";
const FALLBACK_CONDUCTOR_ID = "";

const statusEl = document.getElementById("status");
const currentUserEl = document.getElementById("currentUser");

const vehicleSelect = document.getElementById("vehicleSelect");
const vehicleInput = document.getElementById("vehicle");

const clientSelect = document.getElementById("clientSelect");
const clientInput = document.getElementById("client");

const pickupSelect = document.getElementById("pickupSelect");
const pickupInput = document.getElementById("pickupPlace");

const dropoffSelect = document.getElementById("dropoffSelect");
const dropoffInput = document.getElementById("dropoffPlace");

const bultosInput = document.getElementById("bultos");
const kgInput = document.getElementById("kg");
const m3Input = document.getElementById("m3");
const observationsInput = document.getElementById("observations");

const mozoInput = document.getElementById("mozo");
const trampillaInput = document.getElementById("trampilla");
const urgenteInput = document.getElementById("urgente");

const preview = document.getElementById("previewFoto");
const cameraInput = document.getElementById("cameraInput");
const galleryInput = document.getElementById("galleryInput");

const sesion = JSON.parse(localStorage.getItem("sesionAppTransporte") || "null");

if (!sesion || sesion.role !== "driver") {
  window.location.href = "login.html";
}

currentUserEl.innerText = sesion.username || "sin usuario";

window.cerrarSesion = function () {
  localStorage.removeItem("sesionAppTransporte");
  window.location.href = "login.html";
};

let ultimaPhotoUrl = null;
let conductorActual = null;

function normalizarNumero(valor) {
  if (valor === null || valor === undefined || valor === "") return null;
  return parseFloat(String(valor).replace(",", "."));
}

function getSelectedPhotoFile() {
  return cameraInput.files[0] || galleryInput.files[0] || null;
}

async function subirFoto(photoFile, prefix = "") {
  const fileExt = (photoFile.name.split(".").pop() || "jpg").toLowerCase();
  const safeExt = fileExt.replace(/[^a-z0-9]/gi, "") || "jpg";
  const fileName = `${prefix}${Date.now()}.${safeExt}`;

  const { error } = await supabase
    .storage
    .from("pod")
    .upload(fileName, photoFile, { upsert: true });

  if (error) {
    throw new Error("Error subiendo foto: " + error.message);
  }

  return `${SUPABASE_URL}/storage/v1/object/public/pod/${fileName}`;
}

async function leerFotoAutomatica() {
  try {
    const file = getSelectedPhotoFile();

    if (!file) {
      statusEl.innerText = "No se ha seleccionado ninguna foto";
      return;
    }

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
    statusEl.innerText = "Subiendo foto...";

    ultimaPhotoUrl = await subirFoto(file, "preview-");

    statusEl.innerText = "Leyendo albarán con IA...";

    const response = await fetch("https://jpnritlcfumjmdpoaytr.functions.supabase.co/leer-albaran", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        image: ultimaPhotoUrl
      })
    });

    const data = await response.json();

    console.log("RESPUESTA IA:", data);

    if (!response.ok) {
      statusEl.innerText = "Error leyendo albarán";
      console.log(data);
      return;
    }

    if (!data.result) {
      statusEl.innerText = "La IA no devolvió datos";
      return;
    }

    let texto = String(data.result).trim();

    texto = texto
      .replace(/^```json\s*/i, "")
      .replace(/^```\s*/i, "")
      .replace(/\s*```$/i, "")
      .trim();

    const json = JSON.parse(texto);

    if (json.cliente) clientInput.value = json.cliente;
    if (json.matricula) vehicleInput.value = json.matricula;
    if (json.lugar_carga) pickupInput.value = json.lugar_carga;
    if (json.lugar_descarga) dropoffInput.value = json.lugar_descarga;
    if (json.bultos) bultosInput.value = json.bultos;
    if (json.kg) kgInput.value = json.kg;
    if (json.m3) m3Input.value = json.m3;
    if (json.observaciones) observationsInput.value = json.observaciones;

    statusEl.innerText = "Albarán leído con IA";

  } catch (e) {
    console.log("ERROR LEYENDO ALBARÁN:", e);
    statusEl.innerText = "Error leyendo albarán con IA";
  }
}

cameraInput.addEventListener("change", leerFotoAutomatica);
galleryInput.addEventListener("change", leerFotoAutomatica);

async function obtenerConductorActual() {
  if (conductorActual) return conductorActual;

  if (sesion?.conductor_id && sesion?.empresa_id) {
    conductorActual = {
      id: sesion.conductor_id,
      empresa_id: sesion.empresa_id,
      usuario: sesion.username || null
    };
    return conductorActual;
  }

  if (sesion?.username) {
    const { data, error } = await supabase
      .from("conductores")
      .select("id, empresa_id, nombre, usuario")
      .eq("usuario", sesion.username)
      .limit(1);

    if (!error && data && data.length > 0) {
      conductorActual = data[0];
      return conductorActual;
    }
  }

  if (FALLBACK_CONDUCTOR_ID && FALLBACK_EMPRESA_ID) {
    conductorActual = {
      id: FALLBACK_CONDUCTOR_ID,
      empresa_id: FALLBACK_EMPRESA_ID,
      usuario: sesion?.username || null
    };
    return conductorActual;
  }

  throw new Error(
    "No se ha encontrado el conductor en Supabase. Haz que el usuario de login coincida con la columna usuario de la tabla conductores o rellena FALLBACK_EMPRESA_ID y FALLBACK_CONDUCTOR_ID en el código."
  );
}

function rellenarSelect(selectEl, primerTexto, valores) {
  const unicos = [...new Set(
    (valores || [])
      .map(v => String(v || "").trim())
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, "es"));

  selectEl.innerHTML = `<option value="">${primerTexto}</option>`;

  unicos.forEach(valor => {
    const option = document.createElement("option");
    option.value = valor;
    option.textContent = valor;
    selectEl.appendChild(option);
  });
}

async function cargarClientesEmpresa() {
  const conductor = await obtenerConductorActual();

  const { data, error } = await supabase
    .from("clientes")
    .select("nombre")
    .eq("empresa_id", conductor.empresa_id)
    .order("nombre", { ascending: true });

  if (error) {
    console.warn("No se pudieron cargar clientes:", error.message);
    return [];
  }

  return data || [];
}

async function cargarPickupsFrecuentes() {
  const conductor = await obtenerConductorActual();

  const { data, error } = await supabase
    .from("frequent_pickups")
    .select("name")
    .eq("empresa_id", conductor.empresa_id)
    .order("name", { ascending: true });

  if (error) {
    console.warn("No se pudieron cargar lugares de carga:", error.message);
    return [];
  }

  return data || [];
}

async function cargarDropoffsFrecuentes() {
  const conductor = await obtenerConductorActual();

  const { data, error } = await supabase
    .from("frequent_dropoffs")
    .select("name")
    .eq("empresa_id", conductor.empresa_id)
    .order("name", { ascending: true });

  if (error) {
    console.warn("No se pudieron cargar lugares de descarga:", error.message);
    return [];
  }

  return data || [];
}

async function cargarVehiculosFrecuentes() {
  const conductor = await obtenerConductorActual();

  const { data, error } = await supabase
    .from("frequent_vehicles")
    .select("name")
    .eq("empresa_id", conductor.empresa_id)
    .order("name", { ascending: true });

  if (error) {
    console.warn("No se pudieron cargar matrículas:", error.message);
    return [];
  }

  return data || [];
}

async function cargarFrecuentes() {
  try {
    const clientes = await cargarClientesEmpresa();
    const pickups = await cargarPickupsFrecuentes();
    const dropoffs = await cargarDropoffsFrecuentes();
    const vehicles = await cargarVehiculosFrecuentes();

    rellenarSelect(
      clientSelect,
      "Seleccionar cliente frecuente",
      clientes.map(c => c.nombre)
    );

    rellenarSelect(
      pickupSelect,
      "Seleccionar lugar de carga frecuente",
      pickups.map(p => p.name)
    );

    rellenarSelect(
      dropoffSelect,
      "Seleccionar lugar de descarga frecuente",
      dropoffs.map(d => d.name)
    );

    rellenarSelect(
      vehicleSelect,
      "Seleccionar matrícula frecuente",
      vehicles.map(v => v.name)
    );
  } catch (e) {
    console.warn("Error cargando frecuentes:", e.message);
  }
}

vehicleSelect.addEventListener("change", () => {
  vehicleInput.value = vehicleSelect.value || "";
});

clientSelect.addEventListener("change", () => {
  clientInput.value = clientSelect.value || "";
});

pickupSelect.addEventListener("change", () => {
  pickupInput.value = pickupSelect.value || "";
});

dropoffSelect.addEventListener("change", () => {
  dropoffInput.value = dropoffSelect.value || "";
});

async function guardarClienteFrecuenteSiNoExiste(nombre) {
  const limpio = (nombre || "").trim();
  if (!limpio) return;

  const conductor = await obtenerConductorActual();

  const { error } = await supabase
    .from("clientes")
    .upsert(
      {
        empresa_id: conductor.empresa_id,
        nombre: limpio
      },
      {
        onConflict: "empresa_id,nombre"
      }
    );

  if (error) {
    console.warn("No se pudo guardar cliente:", error.message);
  }
}

async function guardarPickupFrecuenteSiNoExiste(nombre) {
  const limpio = (nombre || "").trim();
  if (!limpio) return;

  const conductor = await obtenerConductorActual();

  const { error } = await supabase
    .from("frequent_pickups")
    .upsert(
      {
        empresa_id: conductor.empresa_id,
        name: limpio
      },
      {
        onConflict: "empresa_id,name"
      }
    );

  if (error) {
    console.warn("No se pudo guardar lugar de carga frecuente:", error.message);
  }
}

async function guardarDropoffFrecuenteSiNoExiste(nombre) {
  const limpio = (nombre || "").trim();
  if (!limpio) return;

  const conductor = await obtenerConductorActual();

  const { error } = await supabase
    .from("frequent_dropoffs")
    .upsert(
      {
        empresa_id: conductor.empresa_id,
        name: limpio
      },
      {
        onConflict: "empresa_id,name"
      }
    );

  if (error) {
    console.warn("No se pudo guardar lugar de descarga frecuente:", error.message);
  }
}

async function guardarVehiculoFrecuenteSiNoExiste(nombre) {
  const limpio = (nombre || "").trim().toUpperCase();
  if (!limpio) return;

  const conductor = await obtenerConductorActual();

  const { error } = await supabase
    .from("frequent_vehicles")
    .upsert(
      {
        empresa_id: conductor.empresa_id,
        name: limpio
      },
      {
        onConflict: "empresa_id,name"
      }
    );

  if (error) {
    console.warn("No se pudo guardar matrícula frecuente:", error.message);
  }
}

async function guardarEnTablaNueva(datos) {
  const { error } = await supabase
    .from("entregas")
    .insert(datos);

  if (error) {
    throw new Error("Error guardando en tabla entregas: " + error.message);
  }
}

async function guardarEnTablaViejaSinRomper(datosLegacy) {
  const { error } = await supabase
    .from("deliveries")
    .insert(datosLegacy);

  if (error) {
    console.warn("No se pudo guardar en deliveries (tabla vieja):", error.message);
  }
}

function limpiarFormulario() {
  vehicleInput.value = "";
  vehicleSelect.value = "";
  clientInput.value = "";
  clientSelect.value = "";
  pickupInput.value = "";
  pickupSelect.value = "";
  dropoffInput.value = "";
  dropoffSelect.value = "";
  bultosInput.value = "";
  kgInput.value = "";
  m3Input.value = "";
  observationsInput.value = "";
  mozoInput.checked = false;
  trampillaInput.checked = false;
  urgenteInput.checked = false;
  cameraInput.value = "";
  galleryInput.value = "";
  preview.style.display = "none";
  preview.src = "";
  ultimaPhotoUrl = null;
}

window.guardarEntrega = async function () {
  try {
    statusEl.innerText = "Guardando...";

    const conductor = await obtenerConductorActual();

    const matricula = vehicleInput.value.trim().toUpperCase();
    const cliente = clientInput.value.trim();
    const lugarCarga = pickupInput.value.trim();
    const lugarDescarga = dropoffInput.value.trim();
    const bultos = bultosInput.value ? parseInt(bultosInput.value, 10) : null;
    const kg = normalizarNumero(kgInput.value);
    const m3 = normalizarNumero(m3Input.value);
    const observaciones = observationsInput.value.trim() || null;
    const mozo = mozoInput.checked;
    const trampilla = trampillaInput.checked;
    const urgente = urgenteInput.checked;

    if (!matricula || !cliente || !lugarCarga || !lugarDescarga) {
      statusEl.innerText = "Faltan matrícula, cliente, lugar de carga o lugar de descarga";
      return;
    }

    const photoFile = getSelectedPhotoFile();
    let photo_url = ultimaPhotoUrl;

    if (photoFile && !photo_url) {
      photo_url = await subirFoto(photoFile, "entrega-");
    }

    const datosNuevaTabla = {
      fecha: new Date().toISOString().split("T")[0],
      cliente: cliente,
      lugar_carga: lugarCarga,
      lugar_descarga: lugarDescarga,
      bultos: bultos,
      kg: kg,
      m3: m3,
      observaciones: observaciones,
      mozo: mozo,
      trampilla: trampilla,
      urgente: urgente,
      matricula: matricula,
      estado: "pendiente",
      foto_url: photo_url || null,
      conductor_id: conductor.id,
      empresa_id: conductor.empresa_id
    };

    await guardarEnTablaNueva(datosNuevaTabla);

    await guardarClienteFrecuenteSiNoExiste(cliente);
    await guardarPickupFrecuenteSiNoExiste(lugarCarga);
    await guardarDropoffFrecuenteSiNoExiste(lugarDescarga);
    await guardarVehiculoFrecuenteSiNoExiste(matricula);

    const datosTablaVieja = {
      driver_name: sesion.username || conductor.usuario || conductor.nombre || "sin_usuario",
      vehicle_plate: matricula,
      client_name: cliente,
      pickup_place: lugarCarga,
      dropoff_place: lugarDescarga,
      bultos: bultos,
      kg: kg,
      m3: m3,
      observations: observaciones,
      mozo: mozo,
      trampilla: trampilla,
      urgente: urgente,
      distance_km: 0,
      price_eur: 0,
      photo_url: photo_url || null
    };

    await guardarEnTablaViejaSinRomper(datosTablaVieja);

    await cargarFrecuentes();
    statusEl.innerText = "Entrega guardada correctamente";
    limpiarFormulario();
  } catch (e) {
    console.error(e);
    statusEl.innerText = e.message;
    alert("Fallo al guardar: " + e.message);
  }
};

async function initApp() {
  try {
    statusEl.innerText = "Cargando datos...";
    await obtenerConductorActual();
    await cargarFrecuentes();
    statusEl.innerText = "";
  } catch (e) {
    console.error(e);
    statusEl.innerText = e.message;
  }
}

initApp();
</script>

</body>
</html>
