<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menú Admin</title>

<style>
:root{
  --bg:#0b1220;
  --card:#121b2f;
  --accent:#ff7a18;
  --text:#ffffff;
  --muted:#b7c3dd;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#0b1220,#121b2f);
  color:white;
  padding:20px;
}

.wrap{max-width:560px;margin:auto;}

.card{
  background:#121b2f;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

.menuBtn{
  display:block;
  background:#121b2f;
  padding:18px;
  border-radius:14px;
  margin-bottom:12px;
  text-decoration:none;
  color:white;
}

.badge{
  margin-top:10px;
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  background:rgba(255,122,24,.15);
}

/* 🔥 AVISOS */
.alerta{
  padding:14px;
  border-radius:12px;
  margin-bottom:14px;
  font-size:14px;
}

.alerta.warning{
  background:rgba(255,122,24,.15);
  color:#ffcf9d;
}

.alerta.danger{
  background:rgba(255,80,80,.15);
  color:#ffb3b3;
}

/* 🔥 BLOQUEO */
#bloqueo{
  display:none;
  background:#121b2f;
  padding:25px;
  border-radius:18px;
  text-align:center;
}

#menu{display:none;}
</style>
</head>

<body>

<div class="wrap">

  <div id="bloqueo">
    <h2>Suscripción caducada</h2>
    <p id="textoBloqueo"></p>
    <button onclick="cerrarSesion()">Salir</button>
  </div>

  <div id="menu">

    <div class="card">
      <h1>Menú administración</h1>
      <div class="badge" id="nombreAdmin">Admin</div>
    </div>

    <div id="alerta"></div>

    <a class="menuBtn" href="admin-albaranes.html">Albaranes</a>
    <a class="menuBtn" href="admin-facturacion.html">Facturación</a>
    <a class="menuBtn" href="admin-configuracion.html">Configuración</a>

  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://jpnritlcfumjmdpoaytr.supabase.co",
  "sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr"
);

const sesion = JSON.parse(localStorage.getItem("sesionAppTransporte"));

const alertaEl = document.getElementById("alerta");
const bloqueoEl = document.getElementById("bloqueo");
const menuEl = document.getElementById("menu");

function cerrarSesion(){
  localStorage.clear();
  window.location.href = "login.html";
}

function diasRestantes(fecha){
  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const fin = new Date(fecha);
  fin.setHours(0,0,0,0);

  return Math.floor((fin - hoy) / (1000*60*60*24));
}

async function init(){

  if (!sesion || sesion.role !== "admin_empresa"){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("nombreAdmin").innerText = sesion.nombre || "Admin";

  const { data } = await supabase
    .from("empresas")
    .select("*")
    .eq("id", sesion.empresa_id)
    .single();

  if (!data){
    cerrarSesion();
    return;
  }

  // 🔴 EMPRESA DESACTIVADA
  if (data.activa === false){
    bloqueoEl.style.display = "block";
    bloqueoEl.innerHTML = "<h2>Cuenta desactivada</h2><p>Contacta con administración</p>";
    return;
  }

  const dias = diasRestantes(data.fecha_fin_pago);

  // 🔴 CADUCADO
  if (dias < 0){
    bloqueoEl.style.display = "block";
    document.getElementById("textoBloqueo").innerText =
      "Tu suscripción caducó hace " + Math.abs(dias) + " días";
    return;
  }

  // 🟠 AVISO FUERTE
  if (dias <= 3){
    alertaEl.innerHTML = `
      <div class="alerta danger">
        ⚠️ Tu suscripción vence en ${dias} día${dias==1?"":"s"}
      </div>
    `;
  }

  // 🟡 AVISO NORMAL
  else if (dias <= 7){
    alertaEl.innerHTML = `
      <div class="alerta warning">
        ⏳ Tu suscripción vence en ${dias} días
      </div>
    `;
  }

  // ✅ TODO OK
  menuEl.style.display = "block";
}

init();
</script>

</body>
</html>
