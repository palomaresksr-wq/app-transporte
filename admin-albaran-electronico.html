<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crear Albarán Electrónico</title>

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  margin:0;
  padding:20px;
}

.wrap{
  max-width:600px;
  margin:auto;
}

.topActions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.card{
  background:#121b2f;
  padding:20px;
  border-radius:12px;
}

h1{
  margin-top:0;
}

label{
  display:block;
  margin-top:12px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
  box-sizing:border-box;
}

button, .btn{
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btnPrimary{
  width:100%;
  background:#ff7a18;
  color:#1b0c02;
  margin-top:20px;
}

.btnSec{
  background:#24314f;
  color:white;
}

#status{
  margin-top:15px;
  font-weight:bold;
  white-space:pre-line;
}
</style>
</head>
<body>

<div class="wrap">

  <div class="topActions">
    <button class="btn btnSec" onclick="volverAtras()">← Volver</button>
    <button class="btn btnSec" onclick="cerrarSesion()">Salir</button>
  </div>

  <div class="card">
    <h1>Crear albarán electrónico</h1>

    <label>Cliente</label>
    <input id="cliente">

    <label>Dirección entrega</label>
    <input id="direccion">

    <label>Conductor</label>
    <input id="conductor">

    <label>Bultos</label>
    <input id="bultos" type="number">

    <label>Observaciones</label>
    <textarea id="observaciones"></textarea>

    <button class="btnPrimary" onclick="crearAlbaran()">Crear albarán</button>

    <div id="status"></div>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://jpnritlcfumjmdpoaytr.supabase.co",
  "sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr"
);

const sesion = JSON.parse(localStorage.getItem("sesionAppTransporte") || "null");

if (!sesion || (sesion.role !== "admin_global" && sesion.role !== "admin_empresa")) {
  window.location.href = "login.html?logout=1";
}

const statusEl = document.getElementById("status");
const clienteEl = document.getElementById("cliente");
const direccionEl = document.getElementById("direccion");
const conductorEl = document.getElementById("conductor");
const bultosEl = document.getElementById("bultos");
const observacionesEl = document.getElementById("observaciones");

window.volverAtras = function(){
  window.location.href = "menu-admin.html";
};

window.cerrarSesion = function(){
  try{
    localStorage.removeItem("sesionAppTransporte");
    localStorage.removeItem("clienteSeleccionadoAppTransporte");
    localStorage.removeItem("cliente_id_actual");
    localStorage.removeItem("cliente_nombre_actual");
    sessionStorage.clear();
  }catch(e){
    console.error(e);
  }
  window.location.href = "login.html?logout=1&t=" + Date.now();
};

window.crearAlbaran = async function(){
  const cliente = clienteEl.value.trim();
  const direccion = direccionEl.value.trim();
  const conductor = conductorEl.value.trim();
  const bultos = bultosEl.value;
  const observaciones = observacionesEl.value.trim();

  if (!cliente || !direccion) {
    statusEl.innerText = "Faltan datos";
    return;
  }

  statusEl.innerText = "Creando albarán...";

  const { error } = await supabase
    .from("albaranes_electronicos")
    .insert({
      empresa_id: sesion.empresa_id || null,
      cliente: cliente,
      direccion: direccion,
      conductor: conductor,
      bultos: Number(bultos || 0),
      observaciones: observaciones,
      estado: "pendiente",
      created_at: new Date().toISOString()
    });

  if (error) {
    statusEl.innerText = "Error: " + error.message;
    return;
  }

  statusEl.innerText = "✅ Albarán creado correctamente";

  clienteEl.value = "";
  direccionEl.value = "";
  conductorEl.value = "";
  bultosEl.value = "";
  observacionesEl.value = "";
};
</script>

</body>
</html>
