<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL="https://jpnritlcfumjmdpoaytr.supabase.co";
const SUPABASE_KEY="sb_publishable_6CF_v2_aPe5d3faZfQxAuw_f4epFsYr";

const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const statusEl=document.getElementById("status");

const sesion=JSON.parse(localStorage.getItem("sesionAppTransporte")||"null");

if(!sesion){
location.href="login.html";
}

const s=String(ahora.getSeconds()).padStart(2,"0");

document.getElementById("clock").innerText=`${h}:${m}:${s}`;
}

setInterval(actualizarReloj,1000);
actualizarReloj();

function obtenerUbicacion(){
return new Promise((resolve,reject)=>{

navigator.geolocation.getCurrentPosition(
(pos)=>{

resolve({
latitud:pos.coords.latitude,
longitud:pos.coords.longitude,
precision:pos.coords.accuracy
})

},
(err)=>reject(err),
{enableHighAccuracy:true}

)

})
}

window.fichar=async function(tipo){

try{

statusEl.innerText="Obteniendo ubicación...";

const ubicacion=await obtenerUbicacion();

statusEl.innerText="Guardando fichaje...";

const {error}=await supabase
.from("fichajes")
.insert({

conductor_id:sesion.conductor_id,
empresa_id:sesion.empresa_id,
usuario:sesion.username,
nombre:sesion.nombre,
tipo:tipo,
latitud:ubicacion.latitud,
longitud:ubicacion.longitud,
precision_metros:ubicacion.precision,
observaciones:document.getElementById("observaciones").value

})

if(error){
throw new Error(error.message)
}

statusEl.innerText=`Fichaje ${tipo} guardado correctamente`;

}catch(e){

statusEl.innerText="Error: "+e.message

}

}

</script>
